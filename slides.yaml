**Figure 4.1. Model-7468 GenAI Selling Points end-to-end architecture.** The diagram presents the model in four phases: document pre-processing (document parsing, text chunking and embedding with text-embedding-ada-002, and document metadata extraction using GPT-4o, stored in the PostgreSQL database); the product recommender (a recommender interface and recommendation engine driven by the parsed product-recommendation mapping document and the customer profile); the selling points generator (template assembly, query embedding with text-embedding-ada-002, database query, context assembly, generation using GPT-4o, post-processing, and the response, which in production is served through the production cache); and feedback and analytics (display, and the collection, storage, and analysis of ratings, thumbs up or down, and comments). The model uses the same foundation model, GPT-4o, for both metadata extraction and generation, and text-embedding-ada-002 for both document and query embedding.

The documentation's architecture diagram does not depict the production cache, although the cache is part of the production pathway as described above and the deployed configuration confirms caching is enabled; the figure shown here is adapted by Validation to include it, and the correction to the documentation is included in the Documentation Transparency and Robustness Finding (Section 5.4). Whether full production captures the complete feedback loop shown in the figure, including the feedback components not collected during the pilot, is tracked under the Findings on Coding and Calculation Errors and Monitoring (Section 5.4); in the pilot, the structured feedback tracked the product recommendation, and the free-text field can address either output but is sparse in practice (see Section 12).

The production pathway is cached at serve time. Product recommendations are fixed for each customer segment, and previously generated selling points are returned from a cache keyed by customer segment. Content is generated by the model within each environment, at startup and on regeneration events, and when no cached output exists for a segment; the release controls around regeneration are addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4). The model is characterized as static in the documentation and the Archer record in the sense that no automatic recalibration or retraining occurs; content generation nonetheless occurs within the production environment as described above. This is addressed in Sections 10.1 and 10.3. The knowledge base is refreshed on demand, in an event-driven manner when documents are uploaded or removed, with no scheduled batch re-indexing; the cache is regenerated accordingly.

The model has no upstream or downstream models. Its inputs are data rather than model outputs: customer attributes are sourced from the ELZ data store, the source system as named in the model documentation, and the recommender mapping is a configured lookup. The downstream consumer is the Salesforce banker workflow, a user-facing system rather than a model, in which a banker reviews the selling point before use but cannot modify it, as the generated selling points are controlled upstream. The structured feedback collected is oriented to the product recommendation (thumbs up or down, with preset reject reasons); the free-text field can carry comments on either the recommendation or the generated selling point, though banker feedback is sparse, and the 1-to-5 selling-point ratings described in the Provisional Approval were not implemented (Section 12). The committed selling-point feedback collection was not enabled at the start of this validation; the model owner states it has since been enabled, which Validation has not verified (Section 5.4). Because there are no interconnected models, no model system applies, as addressed in Section 9.

The principal assumptions and limitations are the dependence of output quality on knowledge base accuracy and currency, generative phrasing variability controlled through low temperature and caching, limited domain coverage beyond the documented products, the absence of provenance in the user interface, and the limited selling-point quality signal available from the sparse captured feedback. These are summarized in Section 3 and assessed in Sections 7.5, 8, and 12.
