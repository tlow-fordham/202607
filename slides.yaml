The monitoring plan additionally carries metrics that are not part of the development performance evidence: a document mapping score, user feedback rates and comments, and three sensitivity variation measures. These are assessed with the monitoring plan in Section 12 of this validation report.

**Validation Comments:**

The three groups in Table 8.1 are assessed in turn below.

#### 8.1.1.1 Metrics Not Obtained

No scores were available for review for two sets of disclosed metrics:
1. The four llm_critique sub-scores defined in MDD Appendix B are computed in intermediate steps but are not retained with the recorded composite, so no sub-score values exist to review and a recorded composite cannot be decomposed or audited.
2. The faithfulness, answer relevance, and context relevance evaluations described in MDD Section 6.2.2 are not produced as scores. The MDD is internally inconsistent on faithfulness: MDD Section 6.2.2 attributes it to the llm_critique judge, MDD Section 7.1 attributes it to the subject matter expert review, and the implemented judge prompt in MDD Appendix B contains no faithfulness criterion, carrying only a 15 percent accuracy criterion.

Validation raises the description of evaluations that are not produced, and the inconsistent attribution of faithfulness, as part of the Moderate Priority Finding on Documentation Transparency and Robustness (Section 5.4 of this validation report). The non-retention of the four sub-scores is raised as part of the High Priority Finding on Performance of Estimation Method and is assessed with the llm_critique composite below.

#### 8.1.1.2 Metrics Withdrawn

The withdrawn metrics consist of the retrieval evaluation, which comprises the four retrieval metrics (Precision@k, Recall@k, nDCG@k, and MRR), and the context similarity score. All five were delivered during the validation. The withdrawal followed Validation's challenge: Validation's independent analysis found the reported values infeasible given the metric's construction, and Validation raised the discrepancy with the MD. The MD then stated the published results were erroneous and withdrew all five metrics from consideration during the validation period. The monitoring plan derives baselines from the same evaluation pipeline, so the deficiencies that led to the withdrawal remain relevant. They are assessed below, the retrieval evaluation first and then the context similarity computation.

**Retrieval evaluation (Precision@k, Recall@k, nDCG@k, MRR).** The offline evaluation computes these four metrics by comparing the documents recorded for each selling point against a per-product reference set of expected documents at several ranking cutoffs; the published results reported high values across these metrics. Validation notes that the retrieval evaluation does not conform to industry best practice and reports infeasible values:
1. The reported values are infeasible: the metric compares the documents each selling point cites against a per-product set of expected documents, of which there are several per product, so recall at the top rank cannot exceed one divided by the number of expected documents, on the order of 10 to 20 percent, yet the reported top-rank recall is far higher.
2. It measures attribution, not retrieval: the documents compared are those each output cites, not the ranked output of the retriever.
3. It uses no true relevance labels: the reference set is a list of expected document identifiers, which substitutes an identifier match for a judged relevance label.
4. It is not reproducible: the development-environment results cannot be reproduced because the underlying data is no longer available, and the code and prompt artifacts provided were revised during the validation so the code version that produced the results is not identified. The withdrawal that followed Validation's challenge is described above.
5. Its provenance is undocumented: the documentation does not state the environment or run date of the results, the sample selling points in the documentation carry scores the production configuration does not produce, and mean reciprocal rank and normalized discounted cumulative gain appear only on the evaluation page, never in the model documentation or the provisional approval forms.

Validation raises these as part of the High Priority Finding on Performance of Estimation Method and requests that the MD re-establish a valid evaluation methodology against the current corpus before any future regeneration, retain the generation-time and evaluation artifacts, and state the environment and run date of any reported results.

**Context similarity.** The withdrawn run also carried the context similarity score. The computation substitutes the first product document when the product-title match fails and is not performed against the retrieved chunks supplied to generation, so a re-run of the same code would produce scores computed against the wrong context. These defects are raised as part of the Moderate Priority Finding on Coding and Calculation Errors, which requests correction before any of these computations are used for ongoing monitoring.

#### 8.1.1.3 Metrics Obtained and Not Withdrawn

The scores available for assessment are the effectiveness score, the llm_critique composite, and the subject matter expert pass/fail outcome. Each is assessed in turn, followed by the serving control and Validation's independent analysis of the served content.

**Effectiveness score.** Its production values are shown in Table 8.2: 169 of the 172 generated selling points carry a score of exactly 0.92 and the remaining three carry 0.95 (the three static money-movement entries, which are not generated, carry 1.00 and are out of scope).

**Table 8.2 - Effectiveness score distribution across the 172 generated selling points.**

| Effectiveness score | Selling points | Percent |
|---|---|---|
| 0.92 | 169 | 98.3 |
| 0.95 | 3 | 1.7 |
| Total | 172 | 100.0 |

Percentages are rounded to one decimal place. The effectiveness-score instruction in the generation prompt provided to Validation reads in full:

> IMPORTANT: Return an 'effectiveness_score' field (float between 0 and 1) that estimates how persuasive and relevant this selling point is for the provided customer profile and context.

Validation notes that the effectiveness score does not conform to industry best practice for evaluating generated content:
1. The prompt is ambiguous: it asks only for a float between 0 and 1 estimating how persuasive and relevant the selling point is, with no rubric, reference value, scale, or examples.
2. It is not independent: the score is returned by the same GPT-4o call that writes the selling point, so the model rates its own output.
3. It measures the wrong property: persuasiveness and relevance are marketing quality, while the risk that matters for a retrieval-augmented model is factual grounding and faithfulness.
4. It carries no explainability: no rationale or reasoning is recorded with the score, so the basis for any value cannot be examined.
5. It is not traceable, and the uniform value may be a default: the per-generation traces are not saved, so a recorded value cannot be tied to the output that produced it. Because the uniform 0.92 cannot be reconciled to the code and prompt provided, it may be a default or fallback set in a code version not provided.
6. It is undefined and non-discriminating: the model documentation does not define the metric, and the near-uniform production values provide no discrimination between outputs.

Validation raises these as part of its High Priority Finding on Performance of Estimation Method (Section 5.4) and requests that the MD define the score, its scale, and its intended use in the documentation; score it through a separate, independent evaluator against a defined rubric; record a rationale and retain, for each score, the model output and the code version so a value can be traced to its source; and demonstrate that it discriminates between effective and ineffective outputs, or remove the score from the model output and from any monitoring reliance.

**Large language model as-a-judge (llm_critique).** This second automated score applies a four-criterion weighted rubric (reproduced in the judge prompt in MDD Appendix B): information utilization at 40 percent, clarity and structure at 25 percent, persuasiveness at 20 percent, and accuracy at 15 percent. Its production score distribution is shown in Table 8.3.

**Table 8.3 - Large language model as-a-judge (llm_critique) score distribution across the 171 scored selling points.**

| Judge score | Selling points | Percent |
|---|---|---|
| 0.00 | 2 | 1.2 |
| 0.62 | 19 | 11.1 |
| 0.72 | 119 | 69.6 |
| 0.74 | 5 | 2.9 |
| 0.78 | 23 | 13.5 |
| 0.82 | 3 | 1.8 |
| Total | 171 | 100.0 |

Percentages are rounded to one decimal place. One generated selling point carries no judge critique, so 171 of the 172 generated selling points are scored.

Validation notes that the judge score does not conform to industry best practice:
1. The rubric is mis-weighted: accuracy, the only criterion bearing on factual grounding, carries the lowest weight at 15 percent, so the composite mainly reflects marketing quality; an output scoring zero on accuracy can still exceed both acceptance thresholds stated in the monitoring plan.
2. It does not measure grounding directly: the accuracy criterion accepts the secondary product context as grounding, and the prompt's do-not-penalize list includes metrics and technical details absent from the source material, so unsupported specifics may not be flagged; no criterion addresses pricing language or other compliance constraints.
3. It cannot be decomposed: the four sub-scores are not retained with the recorded composite (Section 8.1.1.1), so a recorded score cannot be audited.
4. The score does not match its rationale: the recorded critique text is near-identical across score bands, with the same language accompanying scores from 0.62 to 0.78, so the numeric differences carry no discernible meaning, and the scores concentrate on a small set of values (Table 8.3).
5. The documented prompt does not match the recorded scores: the judge prompt appended to the documentation is a revision that requires four sub-scores, whereas the recorded critiques carry a single overall score, and the prompt version that produced the recorded scores was not provided.
6. The recorded values may be defaults: the two scores of 0.00 match a score-extraction failure default in an earlier version of the code (the current version defaults to 0.50), and the dominant 0.72 cannot be reconciled to the code and prompt provided; because the raw outputs are not saved, these values cannot be traced to their source.

Validation raises these as part of the High Priority Finding on Performance of Estimation Method and requests that the MD, if the judge evaluation is retained, report all four sub-scores with each recorded composite; retain, for each score, the model output and the code version so a value can be traced to its source; revise the evaluation dimensions to measure factual grounding directly (for example faithfulness, context relevance, and answer relevance); and align the judge prompt in the documentation with the implemented prompt and provide the prompt version applicable to any reported scores, or remove the evaluation from performance and monitoring reliance.

**Subject matter expert review.** The subject matter expert review presented as the primary performance evidence is not evidenced by the file provided. The review is evidenced only by a single blanket attestation that the entire set of selling points passes. A row-level review is not evidenced: no per-row pass outcome, reviewer rationale, or comment was received or formally captured, the results file has no reviewer-comment field, and the stored approval flag remains not-approved on every row. The Model Owner (MO) populated the per-row pass entries after the review, the file records none of the segment information the MDD states is reviewed with each output, and it displayed the system's automated scores alongside each row. A pass is recorded for every row at every automated score value, including the two rows the system scored 0.00. There is also no mechanism for reviewer edits to update the served content, so the review provides no curation of the selling points and operates at most as an advisory pass. The sufficiency of the review is therefore not evidenced.

**Serving control.** No control requires a selling point to be reviewed before it is served. The is_approved flag stored on each output is not used and is not visible to users, so what is shown does not depend on whether a review occurred, and subject matter expert approval is not enforced by the system; content is generated by the model within each environment and is replaced when the cache is regenerated. Outputs are served from the cache with no generation at serve time; customer profiles that do not meet the recommendation criteria return a no-recommendation outcome, with no new content generated at serve time, and new products or segments require subject matter expert review and formal onboarding before inclusion. Empirical verification of cache-miss and new-segment handling is deferred to the Part 2 implementation verification (Section 11.3).

Validation raises the subject matter expert review and serving-control observations above as part of the High Priority Finding on Performance of Estimation Method and requests that the MD provide the reviewer's row-level record or a written attestation of the reviewer, dates, and method, and implement a documented row-level review with a mechanism for reviewer edits to update the served content before production content is regenerated. The documentation aspects of the metrics above are raised in the Moderate Priority Finding on Documentation Transparency and Robustness, and the monitoring plan's reliance on the judge in the Moderate Priority Finding on Monitoring (Section 5.4).

**Validation Independent Analysis.** Validation performed an independent faithfulness review of all 172 cached selling points against the nine Elavon-branded source documents, the curated selling-points source (elavonSellingPoints.xlsx), and the product database descriptions included in the generation prompt (Section 7.3), accounting for the Talech-to-Elavon rebranding applied in processing. The review identified three selling points, all for Elavon Terminal, with unqualified cost phrasing traced to the recommender input data, which lists a free plan for Terminal contexts; Terminal requires hardware rental or purchase, so the phrasing is inaccurate as to total cost. The business line acknowledged the limitation and the correction is tracked to closure under the High Priority Finding on Performance of Estimation Method. This independent review of the full served population is the primary performance evidence for this validation.

On this basis, and given that bankers review each selling point before use, Validation has no overall concern with the performance of the served selling points for the intended internal-facing use. The deficiencies set out above concern the reported performance evidence and controls; Validation's independent faithfulness review of the served content itself found only the three Terminal cost-phrasing items. They are carried as the Findings identified above, and the restriction in Section 3 of this validation report holds the residual regeneration and review-control risk pending remediation of the High Priority Finding on Performance of Estimation Method.

### 8.1.2 Guardrail Review

The documented guardrails comprise input controls (Personally Identifiable Information (PII) detection using the Presidio framework, which identifies sensitive information such as email addresses, phone numbers, credit card numbers, and Social Security numbers and masks or removes them according to configuration; masking of sensitive content prior to processing; access control filtering; and the absence of free-text end-user input, as the model is driven by structured customer attributes) and output controls (compliance filtering, toxicity detection, and formatting validation). In addition, GPT-4o is reached only through the enterprise gateway, which applies PII filtering on inputs and outputs, logging, and content filtering across four harm categories to all traffic (Section 7.3). Bankers review each output before use. The MDD documents a Human Review Notice stating that the application is for internal banker use and is intended to assist rather than replace professional judgment, that bankers are expected to review generated content before using it in customer conversations, and that outputs serve as conversation starters and informational guidance rather than final marketing, legal, compliance, or contractual language.

**Validation Comments:**

The model's input and output controls and the enterprise gateway controls are enterprise-standard and apply to all gateway traffic. They mitigate generic content and privacy risk and provide a defense-in-depth layer; the model-specific faithfulness and grounding assessment set out above addresses the grounding risk particular to this model. Independent adversarial, toxicity, and red-team testing were not performed for this internal-facing, low risk model with structured inputs; the exposure that motivates that testing is limited here, the human review control is the primary mitigant, and hallucination risk is assessed through the independent faithfulness review described above. The MD did not report guardrail false-positive or false-negative rates; Validation independently reviewed all served selling points and bankers review each output before use, so the outcome rests on that independent review and the banker control. Because the model is available only to trained internal users and all outputs are reviewed by bankers before use, no separate customer-facing pop-up warning or acknowledgment screen is presented; the banker review control and the documented Human Review Notice address the risk-warning and not-final-language considerations that a customer-facing model would otherwise handle through output disclaimers. Validation has no concerns with the guardrail approach or with the absence of a customer-facing output disclaimer for this internal-facing use.

## 8.2 Benchmarking Analysis

Benchmarking is out of scope for this validation. There is no incumbent automated system performing this function and no comparable internal or external benchmark for the generated content, and the documentation records this exclusion and its basis, which is acceptable for a non-replacement, low risk model.

## 8.3 Sensitivity and Robustness Analysis

Sensitivity and robustness analysis is out of scope for this validation. The model serves fixed, pre-generated content from a cache, so identical inputs return identical outputs, and the model has no trained parameters whose response to input changes would need sensitivity testing; robustness in production comes from the deterministic recommender, the grounding of outputs in retrieved documents, the fixed cached content, and the structured, non-free-text inputs. The monitoring plan provides for ongoing sensitivity monitoring; the alignment of its methodology with the model's cache-based design is assessed in Section 12. The cache-retrieval behavior was evidenced by a 20-sample test reported in the documentation in which served responses matched the cached content character-for-character across a range of segments; a re-run against the current Elavon-branded cache is part of the Part 2 implementation verification (Section 11.3), which is out of scope for this validation.

## 8.4 Explainability Testing

According to the MDD, explainability is supported by citations stored with each output, backend traceability to the retrieved chunks, and the retrieval ranking; these record which content was supplied to generation. The stored output record separately carries the model's self-reported usage of that content, with a disclaimer to that effect.

**Validation Comments:**

Counter to the MDD's representation, Validation was unable to observe the explainability the documentation describes:
1. The citations do not evidence which sources were used: in the generation code, the stored citations list every document supplied to the generation call, so they record the inputs supplied to generation and do not identify the subset the output actually relied on.
2. Provenance is not exposed to the banker: the citations are held in the backend output record and are not shown in the user interface, so a banker reviewing an output cannot see the underlying source at the point of use.
3. The model's self-reported usage cannot be verified: the stored usage field is self-reported and, because the per-generation traces are not saved, cannot be checked against the content actually used.

Under the streamlined validation process, Validation relied primarily on the evidence provided by the MO/MD at the time of validation kickoff, so the items above are noted as unobserved against that evidence. The documentation's overstatement of the explainability mechanism is raised in the Documentation Transparency and Robustness Finding (Section 5.4). For the current internal-facing use, the source documents are a small, curated set that a reviewer can be familiar with, so a claim can be verified against the source during review. On that basis, and given that bankers review each output before use, the limited explainability does not raise a further concern for the current corpus and internal-facing use. As the corpus grows, this reliance on the reviewer's familiarity with a small document set may become a limitation.

## 8.5 Post-Development Production Adjustments

Post-development production adjustments are out of scope for this validation, as none are applied. The documentation states that output quality is controlled through design, guardrails, and human review.

