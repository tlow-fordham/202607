## 3. Observations and Open Questions for the Working Session

These points should be resolved with Jim Howard before the configurations are finalized as tier baselines or documented in an MDD.

1. Tier 2 versus Tier 3 PII inversion. Tier 2 (moderate risk) masks US_SSN, US_PASSPORT, US_DRIVER_LICENSE, and seven other entity types, while Tier 3 (minimal risk) blocks them outright. If the intent is monotonically stricter controls as risk increases, these actions look inverted. Masking may be deliberate (keeps the conversation usable where a hard block would break it), but the rationale should be documented.
2. Hardcoded LLM config in Tier 1. The Tier 1 content filter references `llm_config_id` c74d2354-559d-4f13-9945-13c90aa3c0a2. This identifier is environment specific and will need remapping if the configuration is imported into another Lumenova workspace or tenant. The MDD should identify which LLM backs this filter. [TBD: which model/deployment does this LLM config point to?]
3. Aggressive minimal-tier PII blocking. Tier 3 blocks DATE_TIME, PERSON, and LOCATION. Ordinary business queries containing a name or a date would be blocked outright, which is likely to drive a high false positive rate on legitimate traffic for a minimal-risk internal use case. Backtesting (Section 6 below) should quantify this.
4. Allowlist scope for Tier 2/3. The allowlist reads like a generic product-support template (order status, shipping, returns) rather than a U.S. Bank specific scope. Each onboarding use case should replace or tailor this list to its intended domain; the common pitfall is an over-narrow scope blocking legitimate queries that lack obvious in-scope keywords.
5. Threshold semantics. Confirm the direction of each threshold (see Section 2.1) before describing strictness in any formal document.
6. Output-side coverage. The exports do not make explicit which policies run on input, output, or both. The MDD must state, per component, whether it scans the user input, the model response, or both. [TBD: confirm per-component input/output scan direction with Lumenova documentation.]

