## 5.5 Other Discussion Items

The following do not represent immediate model risk and are documented for awareness and optional future consideration. Provenance is currently available only in backend logs; exposing source traceability in the user interface would aid banker review and is noted as a future enhancement. Any future use of automated evaluation would require the evaluator design to be revisited; the current large language model as-a-judge evaluator is addressed in the High Priority Finding on Performance of Estimation Method, and the monitoring plan's reliance on it in the Moderate Priority Finding on Monitoring (Section 5.4.2).

Validation's code review also noted inactive and residual code segments: retrieval re-ranking boost paths for business size and product type that carry no practical effect (business size for lack of usable chunk metadata, product type for lack of the attribute it keys on; the documentation aspect is addressed in the Moderate Priority Finding on Documentation Transparency and Robustness, Section 5.4.2), request parameters that are accepted but not used, legacy methods retained for test compatibility, commented-out logic, a duplicated metadata-formatting block that emits chunk metadata twice into the generation prompt, and an approval flag stored on each selling point that is not used to control display. These do not materially alter served content. The approval flag in particular is a candidate for future use: if activated, it could condition serving on completed subject matter expert review and provide a technical complement to the documented review procedure. Any cleanup or activation of these paths is at the model owner's election under the change-management process.

