### 2.3 Restricted topic list differences

Tier 2 and Tier 3 use the same 26-topic allowlist (customer-service and banking topics); only the ordering in the export differs. Tier 1 uses a different 23-topic blocklist.

Tier 2 / Tier 3 allowlist (model responds only to these topics): order status inquiries, return and refund policies, shipping information, account management, billing questions, troubleshooting, setup and installation, software updates, API usage, integration guides, company policies, frequently asked questions, operating hours, contact information, terms of service, product features, pricing information, product comparisons, service availability, technical specifications, finance, banking, insurance, investments, loans, mortgages.

Tier 1 blocklist (model refuses these topics): financial advice, investment recommendations, tax guidance, legal advice, insurance claims, accounting guidance, medical advice, medical diagnosis, drug prescriptions, mental health counseling, emergency instructions, politics, religion, violence, adult content, gambling, substance abuse, illegal activities, weapons, hacking, social engineering, personal data harvesting, discrimination.

