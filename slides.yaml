## Purpose and Refocus

- The meeting was held to recalibrate on Model-7637 following a period in which the team's focus had been on other GenAI models.
- John noted the intent to move Model-7637 forward at a faster pace and to be ready to launch as soon as feasible.
- Baloo confirmed the solution is not agentic. It is a question-and-answer agent that retrieves information from the relevant knowledge base (KB) article and reads it back to the customer, with no tool orchestration, tool calling, or autonomous decision-making beyond the single retrieval-and-response step. Customers may ask follow-up questions.

## Validation Approach: Provisional Approval for a Pilot

- It was clarified that a Provisional Approval (PA) can support either a pilot (limited deployment) or a full implementation (full rollout), and that both are subject to MRG approval.
- Fion Wang, the Model Risk Officer supporting the business line, noted that a Provisional Approval is generally followed by a full review, typically within six months, that the approach requires business justification, and that it is subject to MRG approval before Validation begins.
- Fion noted that a Provisional Approval for full implementation requires a stronger business justification, whereas a pilot is the approach generally used to mitigate model risk given the faster, higher-level review. The choice is a balance between mitigating risk and speed to market.
- John noted that the initial launch will necessarily involve a substantially smaller subset of articles rather than the full knowledge base, which is expected to be built out over time, so the initial phase is effectively a pilot.
- The group agreed a pilot is the more suitable approach for the initial launch, with a phased rollout during the pilot period to gradually increase the number of knowledge base articles. A pilot can run up to twelve months and can include multiple phases.

## Timeline and Documentation

- Current Archer dates: Development Documentation due 07/30/2026, Initial Validation (IV) due 10/16/2026, and Expected Date of First Use 10/30/2026. The two-week gap between the validation due date and first use reflects the time needed to set up the technology.
- Jordan explained that the twelve-week lead time reflects that this is a medium-risk model; the streamlined shorter timeline applies to low-risk models. Jordan offered to work toward a ten-week timeline for the Initial Validation depending on the completeness of the documentation.
- The primary documentation is the Model Development Document, which is more comprehensive and lengthier than the Provisional Approval request form. Documentation prepared for prior GenAI models can be used as a starting point.
- Jordan will send the template location after the meeting and resend the earlier list of initial questions.
- John and Baloo proposed dedicated working sessions over the next two weeks to complete the documentation together.
- It was noted that MRG and regulatory requirements call for evidence of adequate performance and guardrail testing on the actual model using real-world queries.

## Model Scope: Multiple Business Lines Under One Record

- The scope is three business lines, each with its own Interactive Voice Response (IVR) entry point, served by the same model: 24-Hour Banking, Cardmember Service, and MPS North America.
- Jordan raised, as a question for MRG, whether the three business lines and their three use cases could be covered under a single model record and Estimation Method Assessment (EMA).
- Sana confirmed that multiple business lines can be captured within one Estimation Method Assessment, consistent with prior experience covering multiple business lines under one record for other GenAI models, and that Validation can consolidate the validation activity across the business lines.
- The business line may include as full a rollout as it wishes, provided the covered business lines are specified in the request. The current scope is the three business lines listed above.

## Estimation Method Assessment Update

- The current Estimation Method Assessment reflects full production rather than a pilot.
- Sana confirmed the existing Estimation Method Assessment can be updated to reflect pilot use with a rollout plan, rather than submitting a new one.

## Knowledge Base Articles, Tags, and Performance Testing

- Sana confirmed there is no MRG limit on the number of knowledge base articles during the pilot period.
- The model owner states an approximate article count in the Provisional Approval request. Validation will require a proportionate amount of Subject Matter Expert (SME) testing across the article universe: a larger article count requires more SME testing.
- Validation requested article tags, for example categorical labels such as credit card or debit card, because articles may be duplicative across versions of the same topic, and tags support representative performance testing.
- Validation reiterated the request for article counts across the three business lines, confirmation of which articles are customer-facing, and article tags. John is coordinating with Liz Eisert on the article inventory.
- Performance testing was identified as the main bottleneck. Accuracy and completeness of customer queries and model responses need to be assessed, through SME review of queries or an automated evaluation approach.
- Baloo noted the team would likely need to set up a DeepEval evaluation framework, and that resourcing to build the automated testing and evaluation process still needs to be identified. Resourcing was taken offline.

## Environment Availability

- Scott confirmed there is no User Acceptance Testing (UAT) environment available to share at this time.
- The model will be deployed to the AWS UAT environment at a later point. The knowledge base source (ServiceNow) will remain the production environment, as there is no separate ServiceNow test environment to connect to.

## Model Architecture

- Baloo confirmed the model uses Nova Sonic for speech and Claude Haiku for reasoning. The specific Haiku version is to be confirmed.

