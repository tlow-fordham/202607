**Validation Comments:**

**Framework and theory.** The hybrid framework, a deterministic recommender for product selection combined with retrieval-augmented generation for content and a production cache for stability, is consistent with the intended use of producing grounded, consistent product messaging for internal banker review. Restricting generation to retrieved product content and fixing product selection through deterministic logic are appropriate choices for limiting hallucination and output variability in this use case. Validation has no concerns with the overall framework and theory for this internal-facing, low risk use.

**Vendor foundation model.** Because GPT-4o is closed-source and externally hosted, Validation assesses it as a vendor foundation model, relying on the provider's published documentation and on U.S. Bank's contractual and gateway controls. The model internals are not available for direct inspection. This is acceptable for a low risk, internal-facing application whose outputs are grounded in a controlled knowledge base and reviewed by a banker before use. Because both models come from a single external provider and serve more than one stage, a change to either model would affect multiple pipeline stages. The change-management treatment of such a change is addressed in Section 10.1 of this validation report.

**Context window and output tokens.** The input context window of 128,000 tokens is well above the token requirements of this application's knowledge base and prompts, and reliance on retrieval grounding mitigates the knowledge-cutoff limitation for product-specific content. The two documented maximum-output-token values, 25,000 and 2,000, are inconsistent with each other, and neither aligns with GPT-4o's published maximum output, so a 25,000-token output is not achievable; this inconsistency is raised in the Documentation Transparency and Robustness Finding (Section 5.4). The exact GPT-4o snapshot and the production output-token value are not yet verified against the production deployment and are deferred to the Part 2 implementation verification (Section 11.3).

**Benchmark standing.** The MMLU standing in Table 7.6 characterizes general capability and does not substitute for the use-case-specific outcome evaluation in Section 8. Benchmarking is limited to MMLU, which is sufficient to establish general capability for a low risk, internal-facing application, and additional benchmarks such as IFEval and MT-Bench are not assessed. This published standing, together with the use-case fit, supports the appropriateness of the selection; it is distinct from the outcome benchmarking addressed in Section 8.2, which is not applicable for this model.

**Embedding model and gateway.** text-embedding-ada-002 is a prior-generation embedding model and newer embedding models are available. Whether to adopt a newer model is for the MO to consider and does not raise a concern for the current use. The gateway controls are enterprise-standard and apply to all gateway traffic; their construction is described in Section 7.3 and their adequacy as a guardrail is assessed in Section 8.1. Validation has no concerns with the foundation-model selection and access for this internal-facing, low risk use.

## 7.3 Model Construction and Selection

The model is constructed as a six-step pipeline from document ingestion to cached serving:

1. **Chunking and canonicalization.** Documents are chunked using a two-tier approach, page-level segmentation followed by recursive character splitting, at 4,000 characters with 200-character overlap. Chunks are canonicalized to normalize brand and product terminology, which includes a search-and-replace that rebrands the generic Talech source content to Elavon.
2. **Query assembly.** The retrieval query is assembled by a fixed template from the customer profile attributes and general product information. The recommended plan and feature details are excluded from this initial query and enter at re-ranking.
3. **Hybrid retrieval.** A primary dense vector search with L2 (Euclidean) distance over an Inverted File with Flat compression (IVFFlat) index of 100 partitions returns the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships.
4. **Multi-factor re-ranking.** The combined set is scored by a multi-factor relevance score with documented boosts (curated selling-point documents, product-type match, business-size match, content-category match, and recency), penalties (product-type mismatch and near-duplicate content), a minimum relevance threshold of 0.2, and per-document and total chunk limits for diversity. Chunks mentioning the selected product features or plan names receive a relevance boost at this step.
5. **Generation.** GPT-4o generates the selling point at a low temperature (0.2 in the documented configuration; metadata extraction runs at 0.1), with a structured JavaScript Object Notation (JSON) response format and a custom, dynamically assembled prompt that places retrieved chunks behind a clear boundary to limit prompt injection and includes explicit negative constraints, for example not fabricating features and avoiding specific revenue figures. The generation prompt also includes the product name and description from the product database, in addition to the retrieved chunks.
6. **Cache serving.** In production the selling point is served from the cache, with no retrieval or generation at serve time.

The production code path is rag_feature_generator.py; the rag_plus_generator.py path is legacy and not in production.

The input and output guardrails are constructed around the gateway through which GPT-4o is accessed. The gateway applies authentication and authorization, comprehensive logging of interactions, Personally Identifiable Information (PII) detection and filtering, and content filtering, and contractual and technical controls provide that U.S. Bank data is not used by the provider to train its foundation models. The model also applies its own input handling, including PII handling, and output post-processing.

**Validation Comments:**

**Construction and guardrails.** Validation's assessment addresses the production code path (rag_feature_generator.py). Validation has no concerns with the construction approach itself, and has no concerns with the construction of the input and output guardrails as documented; the content and PII filtering are detailed and assessed as guardrails in Section 8.1.

**Injected product descriptions.** The product-attribute language in the outputs traces to the product name and description injected into the generation prompt at step 5, in addition to the retrieved chunks. This grounding pathway is not described in the documentation and is raised in the Documentation Transparency and Robustness Finding (Section 5.4 of this validation report).

**Production configuration.** The configuration block in the documentation shows a development environment setting (ENV_CAT=dev) and a default temperature of 0.2, while the narrative refers to a low temperature for consistency. The configuration values that apply in production, including the temperature, the token limits noted in Section 7.2, and the environment, are not yet verified against the production deployment; that verification is deferred to the Part 2 implementation verification (Section 11.3), which is out of scope for this validation. The absence of documented production configuration values is raised in the Documentation Transparency and Robustness Finding.

**Retrieval index.** The IVFFlat approximate nearest neighbor index is configured with 100 partitions over the 32-chunk corpus, which the documentation describes as a pragmatic balance between speed and recall. The partition count exceeds the number of chunks, so most partitions are empty and the populated ones hold at most one chunk. The standard guidance for this index type is on the order of one partition per thousand vectors, which for a 32-chunk corpus is a single partition. As configured, the index provides no speed benefit, and depending on how many partitions the search examines at query time, it can return an incomplete set of chunks relative to an exact search. Two considerations contain the effect on the current outputs:
1. The entity-link retrieval supplements the dense search so that relevant chunks are not missed, and the generation model makes the final chunk selection, so the hybrid retrieval does not depend on the dense index alone.
2. Every output produced through this retrieval was independently reviewed by Validation, and production serves cache-only with no retrieval at serve time (Sections 8.1 and 11), so any retrieval effect is contained within the reviewed outputs.

These considerations hold for the current cache. The configuration itself remains as built and would govern retrieval again whenever the cache is regenerated. Validation raises the index configuration as part of the Moderate Priority Finding on Coding and Calculation Errors and requests that the MD set the partition count appropriate to the corpus size, or use an exact search, before any future regeneration of the cache.

**Re-ranking boosts.** Two of the re-ranking boosts documented at step 4 do not operate as documented. The business-size boost depends on a company_size value and an annual_revenue field that the documentation states are extracted from the documents by GPT-4o. This chunk metadata is not populated with usable values in production: sampled production rows carry an annual revenue of "unknown," and the MD confirmed that the metadata extractor is not used in production. The MD subsequently characterized the boost as present in the code but operationally inert for most chunks, because most document chunks carry no clear business size and are marked unknown. Under either characterization the boost does not influence ranking as the documentation describes. The product-type boost is a placeholder that cannot operate because the product data model lacks the attribute it keys on. The documentation overstates this processing, which is captured in the Documentation Transparency and Robustness Finding; the inactive code paths themselves are noted for awareness in Section 5.5.

## 7.4 Development Adjustments

Validation reviewed the adjustments applied to the model during development, before final performance evaluation. The development-time adjustments are the retrieval re-ranking tunings, the minimum relevance threshold, and the per-document and total chunk caps described in Section 7.3; their final configured values are disclosed. Consistent with the streamlined scope, the final configurations are disclosed even though a full tuning-justification record is not required at low risk. No score calibrations, overlays, or overrides are applied to the generated output during development. Validation has no concerns with this position. Adjustments applied after development, during or prior to use, are addressed in Section 8.5.

## 7.5 Assumptions and Limitations

The MD identifies four assumptions and limitations, each with a stated materiality and mitigant:
- Dependence on knowledge base quality (high materiality; mitigated by subject matter expert validation and version-controlled updates).
- Generative output variability (medium; mitigated by low temperature and caching).
- Limited domain coverage (low; mitigated by retrieval filtering and fallback responses).
- Token or context limits (low; mitigated by prompt standardization and grounding).

**Validation Comments:**

Validation has no concerns with the MD's characterization for the documented products. Validation additionally noted the following limitations not fully developed in the documentation:
- Provenance is not exposed in the user interface and is available only in backend logs, which constrains a banker's ability to verify the source of a claim at the point of use (Section 8.4 of this validation report).
- The captured feedback signal tracks the product recommendation and does not capture the quality of the generated selling point, which limits the ability to monitor generation quality after deployment (Section 12.1).
- The large language model as-a-judge evaluation provides limited discriminating signal (Section 8.1).
- Output accuracy depends on the accuracy of the recommender input data. Validation's independent faithfulness review identified three selling points, all for Elavon Terminal, in which a plan labeled as free for a product that carries hardware cost produced unqualified cost phrasing, overstating the absence of cost when the accurate description is a low upfront cost; this is raised in the High Priority Finding on Performance of Estimation Method, and the correction is tracked (Section 8.1).

