Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part II.

# 8 Model Outcomes and Performance Review

## 8.1 Outcomes Analysis

### 8.1.1 Performance Analysis

The Model Development Document (MDD) discloses its performance metrics and sub-metrics across the Model Construction section (MDD 6.2.2), the Model Performance and Testing section (MDD 7.1), and the judge prompt in MDD Appendix B. The subject matter expert evaluation is reported against four criteria: accuracy of product representation, alignment with the customer segment, absence of unsupported or incorrect claims, and clarity and usability for banker interactions. A pass is reported for every row. The 172 evaluated selling points are the full population of cached, generating segments (Section 7.1 of this validation report). Table 8.1 inventories each disclosed metric, the MDD section that discloses it, its definition and evaluator, whether Validation obtained the scores, whether the Model Developer (MD) withdrew them during the validation, and whether the monitoring plan carries the metric forward. The rows are sorted by status: metrics whose scores were not obtained, then metrics withdrawn, then metrics obtained and not withdrawn.

