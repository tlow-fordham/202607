Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part II.

# 10 Model Governance

## 10.1 Development Document Review and Model Change Management

**Overall documentation quality and completeness**

The Model Development Document follows the appropriate MRG template version, the Model Development Document Template v3.0 (October 2023), and is signed by the appropriate parties. The documentation describes the model's architecture, data, construction, and guardrails.

**Validation Comments:**

The documentation is adequate to support the review, but does not fully reflect the deployed system. The gaps span:
- The data counts and configuration values (the knowledge base chunk count, the maximum output-token value, and the production configuration).
- The architecture diagram's omission of the production cache.
- The chunk-metadata, entity-link, and retrieval-boost descriptions and the data inventory's curated mapping dataset description.
- The injected product-description pathway and the recommender mapping data.
- The feedback streams collected and the per-environment generation and cache-change governance.
- The effectiveness score and the evaluation descriptions, the Estimation Method Assessment identifier, and residual drafting artifacts.

These are enumerated with the corresponding corrections in the Moderate Priority Finding on Documentation Transparency and Robustness (Section 5.4 of this validation report). Individually correctable, collectively they indicate that the documentation does not fully reflect the model as built. Because the documentation alone was not sufficient for the assessment, Validation collected significant additional development information, including the production and ingestion code, the prompt configurations, the evaluation artifacts, and the row-level production outputs; these are identified among the documents reviewed in Section 2, and the assessment is grounded on those artifacts, with the corresponding documentation corrections requested in the Finding.

**Model change management**

The documentation defines the material-versus-minor model change categories. Under those definitions, the material changes are a change in the foundation LLM, significant modifications to prompt structure, logic, or constraints, changes to retrieval methodology (including the embedding model, chunking strategy, and ranking logic), changes to guardrails, compliance logic, or output controls, and the addition of new product domains or large-scale updates to knowledge base content; material changes require prior Model Risk Governance (MRG) review, updated documentation, and additional testing before production deployment. Incremental knowledge base updates within existing domains, minor prompt wording adjustments, small configuration changes, and routine data or document refreshes are classified as minor, tracked through internal change logs without prior MRG approval.

**Validation Comments:**

Validation considers the material-change definitions appropriate in coverage, including their explicit treatment of the embedding model within retrieval-methodology changes. The definitions classify knowledge base updates by scale, with large-scale updates material and incremental updates minor, and Validation identified two gaps in that classification. First, the threshold between incremental and large-scale is not defined, and because the curated elavonSellingPoints.xlsx source carries the largest retrieval boost, an incremental update to that source can directly change served outputs while classified as minor; Validation's position is that updates to the curated source should be treated as material. Second, the definitions do not address the regeneration of production content, the event through which any content change reaches serving. These gaps are raised in the Documentation Transparency and Robustness Finding, and the changes made to production content during the pilot without a new submission to Model Risk Management are addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4).

Validation also noted changes the Model Owner (MO) should expect to manage under these definitions going forward. The production deployment uses a preview version of the provider's interface (Azure OpenAI API version 2025-04-01-preview); preview versions can change in behavior or be deprecated, so the management of the interface version should be addressed. A change of the foundation model serving any of the model's functions, whether generation, product-to-chunk link extraction, or the automated evaluation, is material under these definitions and requires a separate validation activity before changed content is served; a notification and validation path for such a change should be documented. A change of the embedding model is likewise material under these definitions, which name the embedding model within retrieval-methodology changes; it changes every stored document vector and the retrieval behavior. The MO should confirm whether any changes are expected before the next validation activity.

**Ongoing recalibration and refitting schedule**

The model is static, with no automatic recalibration or retraining. The EMA maintenance section records the model as subject to annual updates, and the knowledge base is refreshed on demand in an event-driven manner when documents are uploaded or removed, with no scheduled batch re-indexing; the production cache is regenerated accordingly (Section 4). Validation has no concerns with the stated schedule. The governance of regeneration events is addressed under Model change management above.

## 10.2 Model Change Review

This section is not applicable to initial validations under the governing template, as there is no prior validation activity against which to assess post-implementation changes. The changes made during the pilot period, including the serving-design change to pre-generated cached content, the Talech-to-Elavon rebranding, and the cache regeneration, are assessed within this validation (Sections 5.2 and 5.4).

