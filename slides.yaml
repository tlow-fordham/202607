# 7 Model Data and Conceptual Soundness

## 7.1 Development Data

The knowledge base consists of nine internal product documents, segmented into 32 chunks, comprising six back office documents (customer database and loyalty, employee management, integrations, inventory management, invoices, and reports) and three solution sheets (restaurant, retail, and service). Customer attributes, namely industry (North American Industry Classification System, or NAICS), sub-industry, and revenue, are sourced from the ELZ data store. The reported evaluation dataset comprises 172 queries with labeled product and document associations, and production evaluation draws on application programming interface (API) transactions with generated outputs.

