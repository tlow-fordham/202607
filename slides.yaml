# 4 Modeling Framework and Business Uses

**Model objective and usage**

Model-7468 GenAI Selling Points is an internally developed new model consisting of a single estimation method under one Model ID, with no sub-models or segments. It generates personalized, product-specific selling points for Business Banking customers from customer attributes and underlying product documentation, supporting Sales and Business Banking teams. The model replaces a manual and template-based process for creating selling points; there is no incumbent automated system performing this function.

The business line's stated objective for the model is to improve on the manual, template-based process in four respects:
1. Personalizing messaging at scale across diverse customer profiles.
2. Grounding selling points in current product capabilities through retrieval-augmented generation.
3. Maintaining consistency with compliance and brand standards.
4. Reducing the operational effort of manual selling-point creation.

Outputs are internal-facing. They are surfaced to bankers within the Salesforce recommendation workflow through an application programming interface (API), and the model does not interact with customers. The scope covers Business Banking customers across the supported industries and revenue bands, mapped to the three documented Elavon payment products. The knowledge base is a small set of product documents (generic Talech documents rebranded to Elavon during processing) together with a curated selling-points source. The model is currently in pilot use from 04/15/2026 through 08/14/2026, restricted to approximately 15 percent of the bankers; per the Model Owner (MO), full launch will expose the model to 527 bankers, nationwide within the United States. The model serves Business Banking customer segments defined by industry (North American Industry Classification System, or NAICS), sub-industry, and revenue band, producing 172 model-generated selling points. The customer and segment counts, the data statistics, and the segment-to-product mapping are set out in Section 7.1 of this validation report.

The scope of this Initial Validation is the model's generation of selling points for the three Elavon products, namely Elavon Mobile, Elavon Terminal, and Elavon Register. Three additional selling points for money-movement products, namely Bill Pay, Payroll, and Enhanced Payments, were compiled by subject matter experts and are stored as static entries in the PostgreSQL database with their own product identifiers; they were added under the Special Purpose Validation extension and are presented directly in the Salesforce interface without passing through the model's generation process. These money-movement selling points are out of scope for this validation and are not assessed in the sections that follow.

**Model framework**

The model uses a hybrid architecture that combines a deterministic product recommender, a retrieval-augmented generation (RAG) component, a foundation large language model (LLM) for generation, and a production cache (see Figure 4.1). The deterministic recommender maps customer industry (NAICS), sub-industry, and revenue band to a recommended product, plan, and key features through a predefined mapping table, so that identical inputs produce identical product selections. Customer attributes and general product information are then assembled by a fixed template into a standardized query; the recommended plan and feature details are excluded from this initial retrieval query and enter at the re-ranking step (Section 7.3). Retrieval embeds the query using the text-embedding-ada-002 model (1,536 dimensions, deployed through Azure OpenAI) and compares it against product-document chunks stored in a PostgreSQL database with the pgvector extension. Retrieval is hybrid: the primary method is dense vector search over an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index, returning the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships; the combined set is re-ranked by a multi-factor relevance score before a final subset is passed to generation. Generation uses GPT-4o, accessed through the enterprise generative AI gateway, with no fine-tuning; the generation prompt includes the product name and description from the product database in addition to the retrieved chunks (Section 7.3). Each output is a structured selling point consisting of a headline, a subheader, a body, bullet points, an optional disclaimer, the identifiers of the source documents supplied to generation (stored as citations, as described in Section 8.4), and an effectiveness score.

