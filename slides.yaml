**Figure 4.1 - Model-7468 GenAI Selling Points end-to-end architecture.** The diagram presents the model in four phases: document pre-processing (document parsing, text chunking and embedding with text-embedding-ada-002, and document metadata extraction using GPT-4o, stored in the PostgreSQL database); the product recommender (a recommender interface and recommendation engine driven by the parsed product-recommendation mapping document and the customer profile); the selling points generator (template assembly, query embedding with text-embedding-ada-002, database query, context assembly, generation using GPT-4o, post-processing, and the response, which in production is served through the production cache); and feedback and analytics (display, and the collection, storage, and analysis of ratings, thumbs up or down, and comments). The model uses the same foundation model, GPT-4o, for product-to-chunk link extraction and generation (the diagram's document metadata extraction branch is coded but not used in production), and text-embedding-ada-002 for both document and query embedding.

The production pathway is cached at serve time. Product recommendations are fixed for each customer segment, and previously generated selling points are returned from a cache keyed by customer segment. Content is generated by the model within each environment, at startup and on regeneration events, and when no cached output exists for a segment. The model is static in the sense that no automatic recalibration or retraining occurs; content generation nonetheless occurs within the production environment as described above. The knowledge base is refreshed on demand, in an event-driven manner when documents are uploaded or removed, with no scheduled batch re-indexing, and the cache is regenerated accordingly.

**Overall Modeling System**

The model has no upstream or downstream models. Its inputs are data: customer attributes are sourced from the ELZ data store, the source system as named in the model documentation, and the recommender mapping is a configured lookup. The downstream consumer is the Salesforce banker workflow, a user-facing system, in which a banker reviews the selling point before use but cannot modify it, as the generated selling points are controlled upstream. The structured feedback collected is oriented to the product recommendation (thumbs up or down, with preset reject reasons); the free-text field can carry comments on either the recommendation or the generated selling point, and banker feedback is sparse. Because there are no interconnected models, no model system applies (Section 9).

**Key Assumptions and Limitations**

Output quality depends on the accuracy and currency of the knowledge base and of the product database descriptions injected into the generation prompt. Generative phrasing varies within the bounds set by the low temperature and the cache. Domain coverage is limited to the documented products. In use, provenance is not exposed to the banker in the user interface, and the captured feedback is oriented to the product recommendation, which limits the selling-point quality signal. The outcome-material items are listed in Section 3, and the assessments are in Sections 7.5, 8, and 12.

