## Performance Evidence

- The Model Development Document and Monitoring Plan reference retrieval performance metrics (recall, precision, and related ranking metrics). Because these metrics are part of the submitted documentation, Validation reviewed the supporting results on the model development team's evaluation Confluence page, which was provided to Validation during the engagement and is referenced in prior meeting minutes.
- Validation recomputed the twelve aggregated retrieval metric values published on the page (recall, precision, MRR, and nDCG at k of 1, 3, and 5) directly from the team's row-level evaluation file and could not reconcile them: the recomputed values are materially lower (for example, recall@1 of 9.65 versus 83.65 published, and MRR@1 of 58.96 versus 86.96 published), and several published values lie outside the feasible range of the stated metrics. Validation also re-ran the team's evaluation script and reproduced the same row-level file.
- The model developer stated that the retrieval evaluation reflects the lower environment and prior-year data, that the golden dataset was built against the lower-environment document chunks, and that the underlying development data is no longer available, so the results cannot be reproduced.
- The model developer stated that the production results section of the evaluation page, including the published aggregated values, was added without his knowledge by an employee who is no longer with the team, is not accurate for production, and should be disregarded, and that the row-level evaluation spreadsheet should also be disregarded. The model developer stated that the quantitative scores available for production are the context similarity or effectiveness score and the LLM critique score; retrieval metrics are not available for production.
- Validation requested that no changes be made to the performance content of the evaluation page, as it is the version referenced by the validation. Identified gaps will be recorded as Findings; the model development team may investigate afterwards, including whether specific results are false positives.
- Validation presented two options under the streamlined validation process: revise and reconcile the documentation with a corresponding timeline adjustment, or proceed to completion on the evidence as provided as of this meeting. The model owner and model development team elected to proceed on the current evidence.
- Validation confirmed how the review proceeds from here: gaps are recorded as Findings and remediated through the standard finding remediation process, no rework or evidence resubmission occurs during the validation window, and Validation will ask clarification questions where needed and will not be requesting new information or additional testing.

## Subject Matter Expert Review Spreadsheet

- Validation noted that the effectiveness score in the review spreadsheet is 0.92 on all generated rows (one row at 0.95; the three static entries are not generated) and asked how the score is produced. The model developer stated the score is generated by the LLM when the selling point is created and will confirm the mechanism and the reason the values are uniform.
- Validation noted that the review spreadsheet displayed the system's automated scores (the effectiveness score and the LLM critique) alongside each selling point during the review; the model owner acknowledged this as a process gap in the review setup.

## Retrieval Flow Clarifications

Validation walked through its understanding of the retrieval flow; the model developer provided clarifications, including: document entity links are created by an LLM call with a confidence score assigned at link creation; embedding-search results carry a base similarity score, with the higher score kept where a chunk appears in both paths and no normalization currently applied between the two score types; a product-family filter separates the money movement and payment solutions families; a 10 percent multiplicative boost applies to chunks mentioning the selected plans or features; boosting is otherwise limited to document type and recency, and chunk metadata is not collected or used; and the top 10 selected chunks are passed to the LLM with the customer profile for generation.

