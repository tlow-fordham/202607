# 3 Summary of Model and Validation Outcomes

**Model information summary (Model-7468):**

- Method identifier and name: Model-7468 GenAI Selling Points
- Method summary: Generates personalized, product-specific selling points for Business Banking customers from customer attributes and product documentation, surfaced to bankers in Salesforce.
- Enterprise Model Assessment identifier: 68224437 per Archer (the Enterprise Model Assessment covering full production use was submitted 07/06/2026 and is pending Model Risk Governance review; Section 10.3 of this validation report)
- Method risk rating: Low
- Model version: 1.0
- Internal or external: Internal (foundation model accessed through the enterprise generative AI gateway; embedding and generation models are externally developed)
- Development date: August 2025 (per MDD Table 2; the May 2026 entry in the version-control table is the MDD document version, not the model development date)
- Production start date: Actual, 04/15/2026 (per MDD Table 2); expected date of first use under full production, 08/17/2026 (per the submitted Enterprise Model Assessment)
- Model owner: Bhavya Reddy, Product Manager, Business Banking Product
- Model developer: Carl Huang
- Business unit: Consumer and Business Banking, Talech Segment Team (per the EMA record)
- Estimation method use: Internal banker-facing generation of product selling points; outputs reviewed by bankers before use.
- Validation analyst: Jordan Low, Aditi Pandey

**Previous validation outcome:**
- Which entity performed the last validation activity: U.S. Bank
- Validation activity: Special Purpose Validation
- Sign-off date: 04/09/2026
- Validation outcome: Approved with Restriction (pilot extended through 08/14/2026; preceded by the Provisional Approval, also Approved with Restriction, signed off 12/11/2025; neither raised actionable or non-actionable observations or Findings. See Section 5.1 of this validation report.)
- Validation analyst: Mehdi Mafi, Jinjun Tong

**Current validation outcome:** Approved with Restrictions. The Initial Validation concludes with an Approved with Restrictions outcome for production use of the model within the validated scope, namely the current cached selling points for the three Elavon products. Restriction Category: Time-bound. Restriction Effective Date: [TBD - sign-off date]. Restriction Description: production use of the current cached selling points for the three Elavon products is approved for six months, from [TBD - sign-off date] through [TBD - sign-off date plus six months]. During the restriction period, no cached selling point may be regenerated and no new selling point may be added to production without documented subject matter expert review before serving and prior notification to Model Risk Management. Lifting the restriction requires closure of the Findings issued in this report, in particular the High Priority Finding on Performance of Estimation Method; if the Findings are not closed within the restriction period, production use is to cease pending remediation. The outcome is driven by Validation's independent faithfulness review of all 172 cached selling points (three flagged, all for unqualified cost phrasing traced to the recommender input data), banker review before use, and the cache-based serving design, weighed against the evidence and control gaps recorded in the Findings. See Sections 5.3 and 5.4.

**Recommendation for additional validation activities:** The Findings are tracked to remediation through the standard issue-management process, with closure required within the restriction period. The Part 2 implementation verification and testing is due approximately 90 days after implementation and remains outstanding as a post-approval item. The next scheduled validation activity is the annual review. Material changes, including any new product domain, a change to the foundation model or retrieval methodology, or a move to dynamic generation, would require a separate validation activity.

**Key assumptions, limitations, and weaknesses:** Output quality depends on knowledge base accuracy and currency and on the product database descriptions injected into the generation prompt; generative phrasing varies, mitigated by low temperature and caching; content is regenerated within each environment, so cached content is replaced through the generative pathway on regeneration events; domain coverage is limited to the documented products; provenance is not exposed in the user interface; three cached selling points carry unqualified cost phrasing traced to the recommender input data, acknowledged by the business line, with the correction tracked to closure under the High Priority Finding on Performance of Estimation Method; the structured feedback is oriented to the product recommendation and the free-text feedback is sparse, which limits the selling-point quality signal; and the automated evaluation scores (the effectiveness score and the large language model as-a-judge) were found to provide no reliable signal and are not relied upon. These are developed in Sections 7.5, 8, and 12.

