## 11.1 Implementation Framework

The implementation framework, as documented in the Implementation Framework section of the model's Implementation Framework and Testing Document, was reviewed with the following observations and conclusions.

| Test Item | Outcome |
|---|---|
| 1. Is the documentation regarding the model's implementation framework complete, comprehensive and clear, including documenting any upstream/downstream models and Centralized Application Repository (CAR) IDs for relevant software/platforms? (Note: This evaluation may take into consideration all implementation related policies, procedures or documents maintained by the implementation team.) | No |
| 2. Are there differences between the development platform/software and production platform/software? (e.g., differences in code language, code libraries, setting selections, etc.) | No |
| 3. Are the data sources used in production different than those used for development? (Note: Here, the focus is on data sources only. Granular differences in data values, formats, pre-processing, etc. are covered in Section 11.3.) | No |
| 4. If the answer to Q2 or Q3 is yes, are the differences clearly and completely documented? (If differences exist, summarize the differences below this table and identify if any differences may impact model output and/or use and how those concerns were resolved.) | Not Applicable/Relevant |
| 5. For dynamic (self-learning) models: Are the computational requirements necessary to support self-training in the production environment sufficiently documented? | Not Applicable/Relevant |
| 6. If this review is based on the model's final Implementation Framework and Testing document, is the document signed by appropriate parties? (Note: If the current review is based on a preliminary document submission, select "Not Applicable".) | Not Applicable/Relevant |

The implementation document describes the architecture that produces the selling points, including the document preprocessing pipeline, storage, product recommender, selling point generator, and feedback and analytics components, and describes the foundation models.

**Additional Validator Commentary:**

Validation noted gaps in the framework description:
- The production cache and the ELZ database components are not discussed.
- Upstream ingestion applications, the North American Industry Classification System mapping dependency, and maintenance responsibilities for the ELZ data and the knowledge base are not identified.
- Centralized Application Repository identifiers are not disclosed for the software components of the system, including the input and production platforms.
- The storage locations for model inputs, outputs, and logging are not specified (the specific data warehouses and tables, including the Synapse and Datadog platforms relied upon), which bears on downstream monitoring.
- The flowchart does not reflect the cache and guardrail components, its Feedback and Analytics component does not accurately represent the user feedback collected, and the foundation-model discussion within the Selling Point retrieval-augmented generation section does not accurately depict the model architecture.
- The document does not clarify that the model has no upstream or downstream models or tools.
- The knowledge base discussion does not include the curated selling-point examples or the recommender rule sheet.
- The document does not discuss how changes to the platforms, systems, or software dependencies could affect model implementation and use.
- The infrastructure description omits channel-specific system constraints that may affect model operation, such as application programming interface rate limits, service quotas, or network restrictions, where applicable.
- The document carries incorrect statements, including that user feedback is collected on a 1-to-5 rating scale and that bankers can edit the selling points, along with front-matter gaps: a TBD risk rating in Table 2, the business unit name "Talech Development" in place of "Elavon Development," an incomplete sign-off page, and residual template instructions, for example the retained note "Archer Method IDs and model owners should be filled in per your organization's model inventory."

These are raised in the Moderate Priority Finding on Implementation Process (Section 5.4). On Question 2, the answer reflects the code language, libraries, and platform software as described; the configuration presented in the documentation is the development environment's, and confirmation of the production configuration values is part of the Part 2 verification (Sections 7.3 and 11.3). Question 5 is not applicable because the model is static. Question 6 is not applicable because the review is based on the initial document submission.

## 11.2 Production Controls and Security

The production controls, as documented in the Production Controls and Security section of the model's Implementation Framework and Testing Document, were reviewed with the following observations and conclusions.

#### 1) Privacy and Security Access Controls

Assess and verify the effectiveness of the controls in place to secure access to the production environment, including the production code, production data, model output, data warehouses, workbooks and any other relevant implementation systems/tools/data.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document states that the solution is accessible only through the BCRM platform to users with the required Access Management entitlements; that requests contain only the hashed customer identifier, industry code, and annual revenue, with no sensitive data passed to the application; and that the development code is maintained in a private GitLab repository protected by entitlements. Validation has no concerns with the access controls as documented. The description is incomplete in respects raised in the Moderate Priority Finding on Implementation Process (the document's Section 6.1): the enterprise-level and deployment-level guardrails, the Presidio mechanism, the tools and frameworks used to enforce them, and any testing of their effectiveness in production, and the privacy, security, and access controls for the Azure Synapse, Datadog, and PostgreSQL platforms are not described.

#### 2) Data Input Controls

Assess and verify the effectiveness of the controls in place to ensure the ongoing quality and relevance of data inputs used by the model in the production environment, including controls to ensure data integrity and appropriate handoffs if the inputs are passed between several systems prior to model calculation.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document states that model input data originates from enterprise systems governed by Enterprise Data Governance, with controlled interfaces, validated schemas, input validation, encrypted transmission, hashed or tokenized customer identifiers, no raw Personally Identifiable Information passed to the large language model, and no free-form end-user input. Validation has no concerns with the input controls as documented. The description does not address vendor contractual data-protection provisions, namely that U.S. Bank data is not retained by the provider or used for purposes outside the agreed scope, such as training, fine-tuning, or refining models; this is raised in the Moderate Priority Finding on Implementation Process (the document's Section 6.2).

#### 3) Model Output Controls

Assess and verify the effectiveness of the controls in place to ensure ongoing integrity of the model's output in production. This includes controls to ensure data integrity and appropriate handoffs if the outputs are passed between several systems prior to use. Evaluate the use of automated or manual controls embedded within the code (e.g., macros that review logs for hard failures that stop the process entirely, or soft failures such as warnings or errors that do not stop the process entirely). For models that run daily or in real-time, the focus should be on real-time or near real-time controls to identify changes or errors in the production environment or model output that may negatively impact downstream reliability and use.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | No |

**Validator Commentary:** The implementation document states that outputs are governed through access controls, guardrails, monitoring, and human oversight; that output data is stored in append-only storage under entitlement-managed access and linked to segment identifiers, product mappings, and timestamps; that generated content is constrained to retrieved and validated product documentation with tone, consistency, toxicity, and compliance filtering and a fallback that returns no selling point when context is insufficient; and that trained bankers review or discard outputs before use. These are the document's statements; Validation's assessment differs in two respects established during this validation. First, generated content is not constrained to the retrieved documentation alone: the generation prompt injects product names and descriptions from the product database (Section 7.3). Second, the human review has no technical enforcement: an approval flag is stored on each selling point but is not used to control display, content is generated within each environment at startup and on regeneration events, and no technical control prevents unreviewed content from being served (the High Priority Finding on Performance of Estimation Method). Failure handling for conditions such as a cache miss is not documented, and the real-time logging description is generic where model-specific information is needed: it cites monitoring tools such as Kibana dashboards, whose use is unclear, and does not describe the Synapse and Datadog logging actually relied upon; these are raised in the Moderate Priority Finding on Implementation Process. The controls as documented are not expected to be effective until the review gating and documented review procedure requested under the High Priority Finding on Performance of Estimation Method are in place; the three served selling points with unqualified cost phrasing (Section 8.1) evidence the absence of an effective output gate, and banker review before customer use is the operative mitigant.

#### 4) Contingency Plans

Assess and verify that the model implementation has contingencies for failures or interruptions, over both short-term (under 1 day) and extended (over 1 day) periods. Include discussion of potential impacts to downstream models and how failures or interruptions are communicated to downstream model stakeholders. A clear contingency plan is particularly important for dynamic models.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document states that interruptions surface an error in the BCRM interface, ServiceNow tickets drive investigation and resolution, and the application is classified as non-critical, so outages are not expected to have a material operational impact. Validation has no concerns with the contingency approach as documented for a non-critical, internal-facing application; the document does not state whether the process differs for short-term (under 1 day) versus extended (over 1 day) interruptions, which is raised in the Moderate Priority Finding on Implementation Process.

#### 5) Model Versioning Controls

Assess and verify the effectiveness of the business processes and procedures for initiating a model update (such as a redevelopment, upgrade, refresh, retraining, or recalibration) and, once developed, evaluating and approving the changes and expected impacts. For generic vendor models, this should include a discussion on how and when U.S. Bank is notified of upcoming model releases, and the processes followed for initiating, reviewing, and approving the model releases.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | Yes |
| Are the controls expected to be effective? | No |

**Validator Commentary:** The implementation document states that redevelopment or version updates require coordination between the Model Developer (MD) and product owners, an assembled project team, and Model Risk Management approval before implementation and use. The versioning process as documented is sound. The controls are not expected to be effective in their current state: production changes during the pilot, including the serving-design change and the rebrand cache regeneration, were made and served without a new submission to Model Risk Management, and the change-inventory-and-attestation and prior-submission requirements are addressed in the High Priority Finding on Performance of Estimation Method.

#### 6) Code Change Management Controls (For custom models or models implemented internally)

Assess and verify the effectiveness of the procedures followed by the implementation team to initiate code changes in the production environment, validate the code for accuracy, and ensure appropriate levels of approval are gained prior to release. This control applies to models implemented internally, including vendor models when U.S. Bank is responsible for deploying vendor-supplied code packages to internally housed software programs or applications.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | Yes |
| Are the controls expected to be effective? | No |

**Validator Commentary:** The implementation document states that development is managed in the bank's GitLab with dedicated and protected release branches, continuous-integration testing, and releases under the enterprise change management process with ServiceNow approvals before production deployment. The change management process as documented is sound. The controls are not expected to be effective in their current state: the code version that produced the current production content could not be tied to a repository state during this validation, and production changes were deployed during the pilot without a new submission to Model Risk Management; the recording of the deployed code version per generation event and the change-inventory-and-attestation requirements are addressed in the High Priority Finding on Performance of Estimation Method.

#### 7) System Backups (For models implemented internally)

Assess the procedures in place for backing up the production environment, including software, model code, configuration files, and production data, as appropriate. It is critical to ensure redundancy and reliability of the production environment to prevent potential loss or disruption.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | Yes |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document states that the supporting systems are classified as Tier 3 under Technology Resiliency Services tiering, with a recovery time objective of 8 hours and a recovery point objective of 1 hour, and that code and configuration are stored in the enterprise GitLab. Validation has no concerns with the backup arrangements as documented.

#### 8) Data Archiving

It is expected that production data used to support models, including output data generated from models, is saved and archived in accordance with internal or regulatory record retention requirements so that results are reproducible and reportable.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | No |

**Validator Commentary:** The implementation document states that model outputs are stored in the dedicated PostgreSQL database linked to request identifiers, that logging captures interface and large language model interactions, and that records are retained for 7 years. The retention description does not distinguish which records carry the stated retention: the Datadog retention policy is not controlled by the model team, logs held in Datadog are purged at each redeployment, which occurs at least every 90 days and often more frequently for security remediations, so their effective retention is the interval between deployments, and the retention strategy for the end-to-end generation workflow (inputs, retrieved content, intermediate outputs) is not described. The archived data is not in a format that supports reportable traceability exports. The controls are not expected to be effective in their current state against the control's purpose of reproducible and reportable results: the development-environment evaluation could not be reproduced during this validation because the underlying data is no longer available, and generation-time artifacts are not retained. These are raised in the Moderate Priority Finding on Implementation Process, and the retention of generation-time artifacts is requested under the High Priority Finding on Performance of Estimation Method.

#### 9) Software Updates (For models implemented internally)

Assess the procedures and controls in place for managing software-related updates and bug fixes to the programs and platforms used in the production environment, to ensure the model continues to function as expected. Examples include upgrading to a new SAS or Python version, pushing out a critical bug fix for production software, or installing a new version of a software package required by the model.

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | Yes |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document states that required software versions are specified in a requirements file used to build the deployment container, so updates occur only through intentional, tested, and model-owner-approved changes. Validation has no concerns with the software update controls as documented.

#### 10) Other Controls: User Access and Training

| Test Item | Outcome |
|---|---|
| Is the documentation and evidence surrounding the controls sufficient? | No |
| Are the controls expected to be effective? | Yes |

**Validator Commentary:** The implementation document does not describe the expected number of users with access to the application, the controls ensuring only authorized use, or whether users must meet knowledge requirements or complete risk-awareness training before access; these are raised in the Moderate Priority Finding on Implementation Process.

## 11.3 Implementation Verification and Testing

Per the governing template, this section applies to an initial validation only when implementation testing is complete and the final Implementation Framework and Testing document has been received. Neither has occurred, so this section is not required for this validation and will be performed once the final document, due approximately 90 days after production use, is received. Items deferred to that review: the production-parity check, including a re-run of the character-for-character cache-parity test against the current Elavon-branded cache; confirmation that the reviewed configuration matches production (the documentation shows a development environment setting); verification of cache-miss and new-segment handling (Section 8.1 of this validation report); and confirmation of whether any records needed for reproducibility exist only in the purged Datadog logs.

## 11.4 Implementation Assumptions and Limitations

Per the governing template, the full review of this section follows the final Implementation Framework and Testing document; Validation reviewed the implementation assumptions presented in the initial submission, with the final review to follow the final document.

The principal implementation assumption is that production serving is cache-only with no generation at serve time, so the served content is limited to the cached entries. Cached selling points do not expire and there is no automatic invalidation; removing or refreshing a cached selling point is a manual action taken under the change process when source content changes, and the absence of automatic expiry is consistent with the static design.

**Additional Validator Commentary:**

Selling points are generated by the model within each environment, including production, at startup and on regeneration events, and no technical control prevents unreviewed content from being served; the production cache was fully regenerated when the source documents were rebranded and was served before review. The Model Owner (MO) has committed that any knowledge base change or new or updated selling point receives subject matter expert review and change management before it is served; this commitment is not yet supported by a technical control or a documented procedure, and the review-gate, review-record, and regeneration-notification requirements are addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4). The documentation does not yet record the cache-only serving design, the manual refresh mechanism, or the review governance for cache changes, which Validation raises under the Moderate Priority Finding on Documentation Transparency and Robustness (Section 5.4).

