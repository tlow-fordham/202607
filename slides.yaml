Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part II.

# 8 Model Outcomes and Performance Review

## 8.1 Outcomes Analysis

The developer reports two forms of performance evidence. The first is subject matter expert validation across the evaluation dataset: the business line reports that the subject matter expert evaluated each selling point against four criteria, accuracy of product representation, alignment with the customer segment, absence of unsupported or incorrect claims, and clarity and usability for banker interactions, with a pass reported for every row. The 172 reviewed selling points are the full population of cached, generating segments, namely the 172 of 186 segments that carry a North American Industry Classification System code (Section 7.1 of this validation report). The second is automated evaluation: a large language model as-a-judge for faithfulness, answer relevance, and context relevance, an effectiveness score attached to each selling point, embedding similarity, and standard retrieval metrics where ground truth is available.

The documented guardrails comprise input controls (Personally Identifiable Information (PII) detection using the Presidio framework, which identifies sensitive information such as email addresses, phone numbers, credit card numbers, and Social Security numbers and masks or removes them according to configuration; masking of sensitive content prior to processing; access control filtering; and the absence of free-text end-user input, as the model is driven by structured customer attributes rather than open user prompts) and output controls (compliance filtering, toxicity detection, and formatting validation). In addition, GPT-4o is reached only through the enterprise gateway, which applies PII filtering on inputs and outputs, logging, and content filtering across four harm categories to all traffic (Section 7.3). Bankers review each output before use. The Model Development Document documents a Human Review Notice stating that the application is for internal banker use and is intended to assist rather than replace professional judgment, that bankers are expected to review generated content before using it in customer conversations, and that outputs serve as conversation starters and informational guidance rather than final marketing, legal, compliance, or contractual language.

**Validation Comments:**

The automated scores provide no reliable signal. The effectiveness score attached to each selling point is a self-assessment requested from the same GPT-4o call that generates the selling point, so no evaluation independent of the generation underlies it. In the production output, 169 of the 172 generated selling points (98.3 percent) carry a score of exactly 0.92 and the remaining three (1.7 percent) carry 0.95 (the three static money-movement entries, which are not generated, carry 1.00 and are out of scope); the code and prompt artifacts provided to Validation cannot be reconciled with these values, and the model documentation does not define the metric.

The large language model as-a-judge evaluation applies a four-criterion weighted rubric (reproduced in the judge prompt appended to the Model Development Document): information utilization at 40 percent, clarity and structure at 25 percent, persuasiveness at 20 percent, and accuracy at 15 percent. Because accuracy, the only criterion bearing on factual grounding, carries the lowest weight, the composite judge score primarily reflects marketing quality rather than faithfulness, and the judge critique did not distinguish grounded from ungrounded outputs. In the production output the judge score takes six distinct values across the 171 scored rows (one row carries no critique): 0.72 on 119 rows (69.6 percent), 0.78 on 23 (13.5 percent), 0.62 on 19 (11.1 percent), 0.74 on 5 (2.9 percent), 0.82 on 3 (1.8 percent), and 0.00 on 2 (1.2 percent). The concentration on a small set of values is consistent with the limited discrimination observed, and the critique text does not align with the numeric score, with near-identical critique language accompanying scores from 0.62 to 0.78. The rubric's construction further limits its value as a risk control:
- An output scoring zero on accuracy, the only criterion bearing on factual grounding, can achieve a composite of 0.85 when the marketing criteria score highly, above either acceptance threshold stated in the monitoring plan.
- The accuracy criterion accepts the secondary product context as grounding.
- The prompt's list of items not to penalize includes metrics and technical details absent from the source material, which is ambiguous as to whether unsupported specifics are flagged.
- No criterion addresses pricing language or other compliance constraints.

The judge sub-scores are computed in intermediate steps but are not retained with the recorded scores, so a recorded composite cannot be decomposed, and the judge prompt appended to the Model Development Document is a revision that does not correspond to the recorded scores: the recorded critiques carry a single overall score without the four sub-scores the appended prompt requires, and the prompt version that produced the recorded scores was not provided.

The published aggregated retrieval results could not be reconciled to the underlying row-level output and include values outside the feasible range of the stated metrics; the model development team stated during the validation that the published production results were erroneous and that the row-level retrieval evaluation should be disregarded, and the development-environment results cannot be reproduced because the underlying data is no longer available. No curated ground-truth relevance labels exist for retrieval evaluation; the withdrawn evaluation derived its ground truth from document-identifier lookups. The sample selling points presented in the documentation carry scores that the production configuration does not produce, and the documentation does not state the environment or run date of the performance evidence; these documentation aspects are raised in the Documentation Transparency and Robustness Finding. The code and prompt artifacts provided to Validation were revised during the validation, and the code version that produced the production content and scores is not identified.

The subject matter expert review relied upon as the primary performance evidence is not evidenced by the file provided. The results file records the pass outcomes without reviewer rationale and without the segment information the Model Development Document states is reviewed with each output; the pass entries were added by the model owner after the review rather than recorded by the reviewer, and the file displayed the system's automated scores alongside each row. A pass is recorded for every row at every automated score value, including the two rows the system scored 0.00. The sufficiency of the review is therefore not evidenced.

Validation performed an independent faithfulness review of all 172 cached selling points against the nine Elavon-branded source documents, the curated selling-points source (elavonSellingPoints.xlsx), and the product database descriptions included in the generation prompt (Section 7.3), accounting for the Talech-to-Elavon rebranding applied in processing. The review identified three selling points, all for Elavon Terminal, with unqualified cost phrasing traced to the recommender input data, which lists a free plan for Terminal contexts; Terminal requires hardware rental or purchase, so the phrasing is inaccurate as to total cost. The business line acknowledged the limitation and the correction is tracked to closure under the High Priority Finding on Performance of Estimation Method. Validation's independent review is the primary performance evidence for this validation.

The serving pathway lacks a review gate. The is_approved flag is not used and is not visible to users, so display is not gated on approval status, and subject matter expert approval is not enforced at the system level; content is generated by the model within each environment and is replaced through regeneration events. Outputs are served from the cache with no generation at serve time; customer profiles that do not meet the recommendation criteria return a no-recommendation outcome rather than generating new content, and new products or segments require subject matter expert review and formal onboarding before inclusion. Validation will verify the handling of cache misses and new segments in the implementation review (Section 11.2).

Validation does not rely on any automated score or on the retrieval evaluation for the outcome and assesses faithfulness directly through the independent review above. The retrieval-results, effectiveness-score, judge-evaluator, review-evidence, and serving-control observations are raised in the High Priority Finding on Performance of Estimation Method; the documentation aspects in the Moderate Priority Finding on Documentation Transparency and Robustness; and the monitoring plan's reliance on the judge in the Moderate Priority Finding on Monitoring (Section 5.4 of this validation report).

On guardrails, the model's input and output controls and the enterprise gateway controls are enterprise-standard, applied to all gateway traffic rather than tuned to this model, so they mitigate generic content and privacy risk but do not substitute for the model-specific faithfulness and grounding assessment above. For this internal-facing, low risk model whose inputs are structured rather than free-text, independent adversarial, toxicity, and red-team testing are not performed; the exposure that motivates that testing is limited here, and the human review control is the primary mitigant. Hallucination risk is assessed through the faithfulness review above. The developer did not report guardrail false-positive or false-negative rates; because Validation independently reviewed all served selling points and bankers review each output before use, the automated guardrails operate as a defense-in-depth layer rather than the primary control, and guardrail error rates are not relied upon for the outcome. Validation has no concerns with the guardrail approach for this internal-facing use.

Because the model is available only to trained internal users and all outputs are reviewed by bankers before use, no separate pop-up warning or acknowledgment screen is presented. Validation has no concerns with the absence of a customer-facing output disclaimer for this internal-facing use; the banker review control and the documented Human Review Notice address the risk-warning and not-final-language considerations that a customer-facing model would otherwise handle through output disclaimers.

## 8.2 Benchmarking Analysis

Benchmarking is out of scope for this validation. There is no incumbent automated system performing this function and no comparable internal or external benchmark for the generated content, and the documentation records this exclusion and its basis, which is acceptable for a non-replacement, low risk model.

## 8.3 Sensitivity and Robustness Analysis

Sensitivity and robustness analysis is out of scope for this validation. The serving pathway is deterministic and cached, so identical inputs return identical outputs at serve time, and there is no parameter training that would warrant input-perturbation sensitivity analysis of a fitted model; robustness in production derives from the deterministic recommender, retrieval grounding, cache-based consistency, and controlled input structure. The monitoring plan provides for ongoing sensitivity monitoring; the alignment of its methodology with the model's cache-based design is assessed in Section 12 of this validation report. The cache-retrieval behavior was evidenced by a 20-sample test reported in the documentation in which served responses matched the cached content character-for-character across a range of segments; a re-run against the current Elavon-branded cache is part of the Part 2 implementation verification (Section 11.3), which is out of scope for this validation.

## 8.4 Explainability Testing

The model's outputs carry citations and retain backend traceability to retrieved chunks, and retrieval ranking provides visibility into which content was supplied to generation. In the generation code, the stored citations list all documents supplied to the generation call, and the stored metadata records the model's self-reported usage separately with a disclaimer to that effect. The documentation describes a planned future enhancement to expose traceability in the user interface.

**Validation Comments:**

The citations attribute the inputs to generation rather than evidencing use; the documentation's presentation of per-output citations without this explanation is raised in the Documentation Transparency and Robustness Finding (Section 5.4 of this validation report). Provenance is not exposed in the user interface, so a banker reviewing an output cannot see the underlying source at the point of use; for the current internal use with banker review, the available backend traceability is sufficient to support source verification during review, and the user-interface limitation is documented as a future enhancement. Concerning patterns in generated content are addressed through the review controls described in Section 8.1. Validation has no concerns with the explainability mechanisms for this internal-facing use.

## 8.5 Post-Development Production Adjustments

Post-development production adjustments are out of scope for this validation, as none are applied. The documentation states that output quality is controlled through design, guardrails, and human review rather than through post-development adjustments.

