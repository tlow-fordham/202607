Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part II.

# 11 Model Implementation Review

Implementation Framework and Testing documentation is required for this model. Implementation review for this validation covers Part 1 of the implementation document (implementation framework, production controls, and implementation assumptions). Implementation verification and testing is Part 2, which is due approximately 90 days after implementation and is out of scope for this validation. Throughout this section, Validation's assessment addresses the controls as documented; the operation of the controls is verified in Part 2, except where this validation itself established facts about a control's operation, which are reflected in that control's assessment. The implementation document is not uploaded to Archer; the upload of the updated document, signed and dated, is requested in the Moderate Priority Finding on Implementation Process (Section 5.4 of this validation report). Verification that the document followed the appropriate MRG template version is pending [TBD]. Supporting implementation evidence reviewed alongside the document includes the deployed configuration and a Synapse application programming interface transaction sample (Section 2).

