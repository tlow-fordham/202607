## 4. MDD Insert: Guardrail Construction Descriptions (Template Section 6, Instruction 8)

The subsections below are drafted for the model developer to paste into the Model Development Document and edit. Bracketed [TBD] items are use-case-specific and must be completed by the model developer; do not leave them in the final MDD.

### 4.1 Tier 1 - High Risk configuration

The application implements the Lumenova Responsible AI (RAI) platform guardrail configuration "Tier 1 - High Risk" (configuration version 1.1, slug tier-1-high-risk-9f36df), the enterprise minimum guardrail policy set for onboarding a Tier 1 high-risk use case. [TBD: state why this use case is Tier 1, referencing the risk tiering assessment.]

Input guardrails. All user inputs pass through pre-processing before reaching the large language model (LLM). Input sanitization detects 20 categories of sensitive entities, including credit card numbers, Social Security numbers (SSN), passport and driver license numbers, bank account numbers, passwords, personal names, phone numbers, email addresses, IP addresses, dates, and locations. A prompt injection detection policy is enabled at a threshold of 0.25, the most sensitive of the three enterprise tiers. In addition, the content filter layer applies an LLM-based prompt injection attacks filter with a filter strength of 0.25, backed by a dedicated LLM configuration ([TBD: identify the LLM model and deployment backing llm_config_id c74d2354-559d-4f13-9945-13c90aa3c0a2]).

Sensitive information handling. The sensitive information filter blocks content containing any of the 20 configured personally identifiable information (PII) entity types (action BLOCK, masking mode TAG). No custom regular expression filters are configured. [TBD: state whether use-case-specific regex filters, for example internal account number formats, were added.]

Content and word filtering. The content filter screens for 15 harmful content categories (violent crimes, non-violent crimes, sex crimes, child exploitation, defamation, specialized advice, privacy, intellectual property, indiscriminate weapons, hate, self-harm, sexual content, elections, code interpreter abuse, and the OpenAI content filter category). A managed profanity word filter is enabled with no custom word list. [TBD: state whether custom words were added for this use case.]

Response quality controls. Trust score and coherence score policies are enabled with a BLOCK action at a threshold of 0.75; responses scoring below the threshold are blocked rather than surfaced. The coherence score weights response groundedness at 0.50 and context relevance and response pertinence at 0.25 each, emphasizing that responses must be grounded in retrieved context.

Topic scope. Restricted topics operate in RESTRICT (blocklist) mode at a threshold of 0.25. The model refuses queries matching 23 blocked topics, including financial advice, investment recommendations, tax and legal advice, medical advice and diagnosis, politics, religion, weapons, hacking, social engineering, and personal data harvesting. [TBD: confirm the blocklist has been tailored to the use case and list any additions or removals with rationale.]

Blocked-content behavior. When any policy blocks content, the user receives the standard message "I'm sorry but I can't help you with that." Early return is disabled, meaning all configured policies evaluate the content. [TBD: describe logging, alerting, and human escalation when a block occurs.]

### 4.2 Tier 2 - Moderate Risk configuration

The application implements the Lumenova RAI platform guardrail configuration "Tier 2 - Moderate Risk" (configuration version 1.1, slug tier-2-moderate-risk-f1fe3b), the enterprise minimum guardrail policy set for onboarding a Tier 2 moderate-risk use case. [TBD: state why this use case is Tier 2, referencing the risk tiering assessment.]

Input guardrails. All user inputs pass through pre-processing before reaching the LLM. Input sanitization detects the same 20 sensitive entity categories as the Tier 1 configuration. Prompt injection detection is enabled at a threshold of 0.50. The LLM-based prompt injection attacks filter available in the Tier 1 configuration is not enabled at this tier.

Sensitive information handling. The sensitive information filter takes a mixed approach across the 20 configured PII entity types. Ten entity types are blocked outright (action BLOCK, masking mode TAG): credit card, crypto wallet, email address, IP address, nationality/religious/political group (NRP), password, person name, phone number, medical license, and U.S. bank account number. The remaining ten entity types are masked rather than blocked (action MASK, masking mode REDACT), allowing the conversation to continue with the sensitive value redacted: date/time, device ID, IBAN code, location, URL, U.S. driver license, U.S. Individual Taxpayer Identification Number (ITIN), U.S. passport, U.S. SSN, and vehicle ID. [TBD: document the rationale for masking rather than blocking government identifiers such as SSN and passport at this tier.] No custom regular expression filters are configured. [TBD: state whether use-case-specific regex filters were added.]

Content and word filtering. Identical to the Tier 1 configuration: 15 harmful content categories and a managed profanity filter with no custom words. [TBD: state whether custom words were added for this use case.]

Response quality controls. Trust score and coherence score policies are enabled with an INFORM action at a threshold of 0.50; low-scoring responses are flagged for monitoring rather than blocked. The coherence score weights context relevance, response pertinence, and response groundedness approximately equally (0.3333 / 0.3333 / 0.3334). [TBD: describe who reviews INFORM flags and on what cadence.]

Topic scope. Restricted topics operate in ALLOW (allowlist) mode at a threshold of 0.50. The model responds only to queries matching 26 permitted topics covering customer-service and banking subject areas (account management, billing, troubleshooting, product features, pricing, finance, banking, insurance, investments, loans, mortgages, and related support topics). [TBD: replace or tailor the allowlist to the intended domain of this use case and confirm coverage of legitimate queries that lack obvious in-scope keywords.]

Blocked-content behavior. When any policy blocks content, the user receives the standard message "I'm sorry but I can't help you with that." Early return is disabled. [TBD: describe logging, alerting, and human escalation when a block occurs.]

### 4.3 Tier 3 - Minimal Risk configuration

The application implements the Lumenova RAI platform guardrail configuration "Tier 3 - Minimal Risk" (configuration version 1.1, slug tier-3-minimal-risk-1de9cd), the enterprise minimum guardrail policy set for onboarding a Tier 3 minimal-risk use case. [TBD: state why this use case is Tier 3, referencing the risk tiering assessment.]

Input guardrails. All user inputs pass through pre-processing before reaching the LLM. Input sanitization detects the same 20 sensitive entity categories as the higher tiers. Prompt injection detection is enabled at a threshold of 0.75, the least sensitive of the three enterprise tiers. The LLM-based prompt injection attacks filter is not enabled at this tier.

Sensitive information handling. The sensitive information filter blocks content containing any of the 20 configured PII entity types (action BLOCK, masking mode TAG), including dates, person names, and locations. [TBD: assess and document the expected false positive impact of blocking dates, names, and locations on legitimate traffic for this use case; see guardrail backtesting in Section 7.2.] No custom regular expression filters are configured.

Content and word filtering. Identical to the higher tiers: 15 harmful content categories and a managed profanity filter with no custom words.

Response quality controls. Trust score and coherence score policies are enabled with an INFORM action at a threshold of 0.50, with approximately equal coherence metric weights, matching the Tier 2 configuration. [TBD: describe who reviews INFORM flags and on what cadence.]

Topic scope. Restricted topics operate in ALLOW (allowlist) mode at a threshold of 0.75, using the same 26-topic customer-service and banking allowlist as the Tier 2 configuration. [TBD: replace or tailor the allowlist to the intended domain of this use case.]

Blocked-content behavior. When any policy blocks content, the user receives the standard message "I'm sorry but I can't help you with that." Early return is disabled. [TBD: describe logging, alerting, and human escalation when a block occurs.]

