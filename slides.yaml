Segments are defined by three attributes: revenue band, industry, and sub-industry. The post-rebrand mapping document (Product Recommendation - After Rebrand.xlsx) contains 186 segment rows across three revenue bands (under $50,000; $50,000 to $500,000; and $500,000 to $2.5 million), four industries (Other, Restaurants, Retail, and Services), and 67 sub-industries. The segments distribute across the revenue bands as 67 (under $50,000), 64 ($50,000 to $500,000), and 55 ($500,000 to $2.5 million), and across the industries as 64 Other, 63 Retail, 47 Services, and 12 Restaurants; the revenue-band by industry breakdown is shown in Table 7.3. Each segment maps deterministically to one product, plan, and five features, and across the 186 segments the recommender assigns Elavon Mobile to 94, Elavon Register to 53, and Elavon Terminal to 39. The plan follows from the product: Elavon Mobile and Elavon Terminal are always the Free plan (133 segments in total), while Elavon Register is the Standard plan (30 segments) or the Premium plan (23 segments). Each segment lists five features drawn from a set of eight; Surcharge and Employee Management appear in every segment, and Customer Management (182 segments), Tap to Pay (158), Invoice (119), Advanced Catalog (53), House Accounts (34), and Online Ordering (12) appear in subsets. Of the 186 segments, 172 generate a cached selling point and 14 do not (Table 7.1 of this validation report).

