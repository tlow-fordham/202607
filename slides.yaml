# 4 Modeling Framework and Business Uses

**Model objective and usage**

Model-7468 GenAI Selling Points is an internally developed new model consisting of a single estimation method under one Model ID, with no sub-models or segments. It generates personalized, product-specific selling points for Business Banking customers from customer attributes and underlying product documentation, supporting Sales and Business Banking teams. The model replaces a manual process in which selling points were written by hand from standard copy templates; there is no incumbent automated system performing this function.

The business line's stated objective for the model is to improve on the manual process in four respects:
1. Personalizing messaging at scale across diverse customer profiles.
2. Grounding selling points in current product capabilities through retrieval-augmented generation.
3. Maintaining consistency with compliance and brand standards.
4. Reducing the operational effort of manual selling-point creation.

Outputs are internal-facing. They are surfaced to bankers within the Salesforce recommendation workflow through an application programming interface (API), and the model does not interact with customers. The scope covers Business Banking customers across the supported industries and revenue bands, mapped to the three documented Elavon payment products. The knowledge base is a small set of product documents (generic Talech documents rebranded to Elavon during processing) together with a curated selling-points source. The model is currently in pilot use from 04/15/2026 through 08/14/2026, restricted to approximately 15 percent of the bankers; per the Model Owner (MO), full launch will expose the model to 527 bankers, nationwide within the United States. The model serves Business Banking customer segments defined by industry (North American Industry Classification System, or NAICS), sub-industry, and revenue band, producing 172 model-generated selling points. The customer and segment counts, the data statistics, and the segment-to-product mapping are set out in Section 7.1 of this validation report.

The scope of this Initial Validation is the model's generation of selling points for the three Elavon products, namely Elavon Mobile, Elavon Terminal, and Elavon Register. Three additional selling points for money-movement products, namely Bill Pay, Payroll, and Enhanced Payments, were compiled by subject matter experts and are stored as static entries in the PostgreSQL database with their own product identifiers; they were added under the Special Purpose Validation extension and are presented directly in the Salesforce interface without passing through the model's generation process. These money-movement selling points are out of scope for this validation and are not assessed in the sections that follow.

**Model framework**

The model uses a hybrid architecture that combines a deterministic product recommender, a retrieval-augmented generation (RAG) component, a foundation large language model (LLM) for generation, and a production cache (see Figure 4.1). At a summary level, a selling point is produced in six steps, detailed in Section 7.3:
1. The deterministic recommender maps the customer's industry (NAICS), sub-industry, and revenue band to a recommended product, plan, and five features through the predefined mapping table, so identical inputs produce identical product selections.
2. A fixed query template assembles the customer attributes and general product information into a standardized retrieval query; the recommended plan and feature details are excluded from this query and enter at re-ranking.
3. The retrieval query is embedded with the text-embedding-ada-002 model and compared against the product-document chunks in the PostgreSQL vector database; this dense search is supplemented by the stored product-to-chunk links, which GPT-4o creates at document ingestion by scoring each chunk's relevance to each product.
4. The combined chunk set is re-ranked by a multi-factor relevance score, and a final subset is passed to generation.
5. GPT-4o, accessed through the enterprise generative AI gateway with no fine-tuning, generates the selling point from a generation prompt assembled separately from the retrieval query; the generation prompt includes the retrieved chunks and the product name and description from the product database.
6. Each output is a structured selling point, comprising a headline, a subheader, a body, bullet points, an optional disclaimer, the citation identifiers of the documents supplied to generation (Section 8.4), and an effectiveness score, and is served in production from the cache.

The pipeline uses four distinct prompt and template texts: in pre-processing (the ingestion-time link extraction noted in step 3), retrieval (the query template in step 2), generation (the generation prompt in step 5), and evaluation (outside the serving flow above). They are named and distinguished in Section 7.3.

