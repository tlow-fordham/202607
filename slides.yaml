#### 5.4.2 Actionable Findings

**Finding Table 1**
- Finding Count: 1
- Finding Name: Model 7468 Initial Validation Jul 2026 - Coding and Calculation Errors
- Finding Priority: Moderate
- MRM Category: Coding and Calculation Errors
- Finding Description: Validation reviewed the model code and identified coding errors in the feedback and evaluation components:
  - The banker feedback collection on generated selling points committed at the Provisional Approval was not enabled in production. The condition was identified during this validation, and the model owner states the collection has since been enabled; Validation has not independently verified the enablement or observed accumulated selling-point feedback.
  - The evaluation code contains defects that will carry into ongoing monitoring if its computations are reused: the context-similarity computation silently substitutes the first product document when the product-title match fails, so scores can be computed against the wrong product's context, and the computation is not performed against the retrieved chunks supplied to generation, so the score does not measure grounding in the generation context; the sensitivity computation returns a default of 1.0 when a comparison set is empty, making the industry sensitivity structurally 100 percent; retrieved document names are not deduplicated before scoring; the judge evaluation records a fixed mid-range score when the model response cannot be parsed, so a recorded score is not always a judgment; and the judge evaluation constructs a recommended-features instruction intended to prevent recommended features from being flagged as unsupported, but the judge prompt template contains no placeholder for it, so the section is silently dropped and never reaches the judge.

  As a result, Validation requests the model owner and model development team to:
  - Provide evidence that the selling-point feedback collection is enabled and operating in production; if the enablement is complete, no further action is required beyond the evidence.
  - Correct the evaluation code defects before any of these computations are used for ongoing monitoring, or confirm in the revised monitoring plan that the affected metrics will not be used for this model.
  - Confirm through ongoing monitoring that a usable selling-point feedback signal accumulates from the collection.

  See Section 12 of this validation report.
- Root Cause Selection: Technical Concern - The noted deficiency does not result from a control environment design deficiency or control breach and does not have a clear root cause.
- Justification for Classification: Per MRM Issue & Finding Management Guidelines, the classification is driven by: The coding errors disable a committed feedback control and introduce evaluation defects that would carry into ongoing monitoring if the computations are reused; the errors do not affect the generated selling points themselves and there is no evidence of incorrect generation. A High Priority Finding is not warranted because the generated outputs are unaffected; a Low Priority Finding is not warranted because the defects bear directly on the monitoring backstop the streamlined scope relies on. Therefore, a Moderate Priority Finding is justified.

**Finding Table 2**
- Finding Count: 2
- Finding Name: Model 7468 Initial Validation Jul 2026 - Documentation Transparency and Robustness
- Finding Priority: Moderate
- MRM Category: Documentation Transparency and Robustness
- Finding Description: The model documentation contains inaccurate or incomplete information and does not fully reflect the model as built. Documentation deficiencies in the Monitoring Plan are addressed in the Moderate Priority Finding on Monitoring.

  Model Development Document:
  - The stated knowledge base chunk count of 28 does not match the current count of 32.
  - The maximum output tokens is stated inconsistently within the Model Development Document, 25,000 in the narrative and 2,000 in the configuration block, and 25,000 exceeds GPT-4o's published output limit.
  - The configuration presented in the documentation is the development environment's (ENV_CAT=dev); the production configuration values, including the environment, temperature, and token limits, are not documented.
  - The architecture diagram does not depict the production cache.
  - The documentation states that per-chunk metadata (including company size and annual revenue) is extracted, maintained, and used in ranking, whereas this metadata is not populated with usable values, so the described business-size boost does not influence ranking in practice; the documentation also lists a product-type match boost among the ranking factors, which cannot operate because the product data model lacks the attribute it keys on.
  - The documentation does not describe that the generation prompt injects the product name and description from the product database, which is the source of the product-attribute language in the outputs, nor any review governance for those descriptions.
  - The sample selling points in the documentation present per-output citation lists without explaining that the citations record the documents supplied to the generation call rather than sources identified as used; the near-identical citation lists across the samples reflect this behavior.
  - The documentation does not describe the recommender mapping data, including the segment population, the North American Industry Classification System code coverage, and the basis for the number of generating segments.
  - The documentation does not state the environment or run date of the performance evidence presented, and the sample selling points shown carry scores that the production configuration does not produce.
  - The documentation does not describe the feedback streams actually collected, their orientation to the product recommendation rather than the generated selling point, or their status: the 1-to-5 selling-point rating described in the Provisional Approval is not collected, and free-text feedback entered under the "Other reason" rejection is not transmitted from the Salesforce interface, a limitation that bears on the feedback signal available for monitoring.
  - The stated Enterprise Model Assessment identifier (EMA - 66885813) refers to the pilot-era assessment rather than the current record (68224437 per Archer).
  - The documentation does not define the effectiveness score attached to each selling point.
  - The documentation's narrative describes a large language model as-a-judge evaluation of faithfulness, answer relevance, and context relevance; this evaluation is not performed, and the narrative does not match the implemented judge rubric (information utilization, clarity and structure, persuasiveness, and accuracy) reproduced in the documentation's own appendix. The documentation does not explain the judge sub-scores, their weights, or the rationale for the weighting.
  - The judge prompt reproduced in the appendix does not correspond to the recorded llm_critique scores: the model development team stated during the validation that the judge prompt has been revised, the recorded score distribution is concentrated on a small set of values, which the appended prompt expressly instructs against, the recorded critiques carry a single overall score without the four sub-scores the appended prompt requires, and the prompt version that produced the recorded scores is not provided.
  - The documentation states that embedding (cosine) similarity between the generated selling point and the source product context is computed as an additional quality signal; this computation is not part of the model's operation, and the evaluation run that produced it was withdrawn by the model development team during the validation (defects in the computation itself are addressed in the Moderate Priority Finding on Coding and Calculation Errors).
  - The documentation states that standard information-retrieval metrics (Recall@k, Precision@k, nDCG@k, and MRR) are computed when ground-truth labels are available; no ground-truth labels exist, and the one evaluation producing these metrics was withdrawn.
  - The documentation states that metadata extraction quality is assessed indirectly through the downstream selling point evaluation pipeline; that pipeline is not in use, and the extracted metadata is not used in production.
  - The documentation does not state that content is generated within each environment and refreshed only through regeneration events, or the governance for cache changes, namely that any knowledge base change or new or updated selling point receives subject matter expert review before it is served.
  - The change-management definitions do not address knowledge base or curated-source updates or the regeneration of production content, each of which can directly change served outputs (Section 10.1 of this validation report).
  - The documentation retains working commentary and drafting artifacts that do not belong in the final document.

  As a result, Validation requests the model owner and model development team to:
  - Correct the chunk count and the output-token value.
  - Document the production configuration values (environment, temperature, and token limits).
  - Describe the citation mechanism, namely that citations record the documents supplied to generation.
  - Record the feedback transmission limitation for the "Other reason" free text and its remediation status.
  - Update the architecture diagram to show the production cache.
  - Correct the chunk-metadata description and disclose the operational status of the business-size and product-type boosts.
  - Document the injected product-description pathway and its review governance.
  - Describe the recommender mapping data (segment population, code coverage, and the generating-segment basis).
  - State the environment and run date for all performance evidence.
  - Document the feedback streams actually collected, their orientation, and their status.
  - Document the per-environment generation design and the subject matter expert review governance for any cache or knowledge base change.
  - Extend the change-management definitions to address knowledge base and curated-source updates and the regeneration of production content.
  - Correct the stated Enterprise Model Assessment identifier to the current record and define the effectiveness score and its intended use.
  - Remove the end-to-end evaluation description or revise it to describe only the evaluation actually performed and relied upon: align the narrative judge description with the implemented prompt reproduced in the appendix, explain the judge sub-scores, their weights, the rationale for the weighting, and the judge's scoring scale and model configuration, remove the information-retrieval metrics claim or state that no ground-truth labels exist to support it, remove the embedding-similarity quality signal claim or state when it was computed and its status, remove the indirect metadata-quality assessment claim, and state the judge prompt version applicable to any recorded or reported scores.
  - Remove the residual drafting artifacts so that the documentation reflects the model as built.
  - Submit the corrected documentation, signed and dated, to Archer.

  Enterprise Model Assessment:
  - The Enterprise Model Assessment describes the effectiveness score as an input to prompt refinement, a use that is not evidenced.
  - The Enterprise Model Assessment's change definition treats only the addition of data sources that dynamically trigger selling-point generation as material, narrower than the documentation's change-management definitions (Section 10.3 of this validation report).

  As a result, Validation requests the model owner and model development team to:
  - Correct the effectiveness-score description in the Enterprise Model Assessment.
  - Align the Enterprise Model Assessment change definition with the documentation's change-management definitions.

  See Sections 4, 7.1, 7.2, 7.3, 10.1, 11, and 12 of this validation report.
- Root Cause Selection: Other Concern [TBD - confirm the standard definition sentence for the Other Concern selection from the Archer dropdown]
- Justification for Classification: Per MRM Issue & Finding Management Guidelines, the classification is driven by: The gaps compromise transparency and led to the improper interpretation of results during this validation, including performance evidence whose environment and provenance were not stated. A High Priority Finding is not warranted because the model's data sources, processing, and controls were established through the validation; a Low Priority Finding is not warranted because the documentation as submitted did not reflect the model as built in respects material to the review. Therefore, a Moderate Priority Finding is justified.

**Finding Table 3**
- Finding Count: 3
- Finding Name: Model 7468 Initial Validation Jul 2026 - Monitoring
- Finding Priority: Moderate
- MRM Category: Monitoring
- Finding Description: The ongoing monitoring plan defines performance thresholds for its metrics, including subject matter expert evaluation (greater than or equal to 95 percent), large language model as-a-judge score, context similarity (greater than or equal to 0.85), retrieval (within plus or minus 10 percent of baseline), and thumbs-down rate (less than or equal to 10 percent). Validation examined the plan and identified the following concerns:
  - The plan's primary automated quality metric is the large language model as-a-judge evaluation, which Validation found does not support a performance conclusion (raised in the High Priority Finding on Performance of Estimation Method, and assessed in Section 8.1 of this validation report); the plan nonetheless relies on it as the primary automated signal.
  - The plan states two different acceptance thresholds for the judge score (0.70 and 0.60) in different sections. Against the production output, 21 of the 171 scored selling points (12.3 percent) score below 0.70 while two (1.2 percent) score below 0.60 (one further row carries no score), so the two stated thresholds produce different monitoring outcomes for the same population.
  - The plan's baselines are defined by reference to the initial automated evaluation outputs, which the model development team withdrew during the validation, so the baselines as defined are not valid.
  - The sensitivity testing the plan describes (shifting inputs and regenerating for comparison) is not implemented; the sensitivity computation that exists in the evaluation code measures cross-segment differences on existing outputs and carries the defects raised in the Moderate Priority Finding on Coding and Calculation Errors, so the plan's sensitivity test cannot currently be executed as described.
  - The structured thumbs up or down feedback and its threshold are oriented to the product recommendation rather than the generated selling point, and the free-text feedback field, which could provide a usable selling-point quality signal, is treated in the plan as a secondary annual manual review with no defined threshold or acceptance criteria.

  As a result, Validation requests the model owner and model development team to:
  - Remove or demote the large language model as-a-judge evaluation from the monitoring plan.
  - Elevate the banker free-text feedback field to the primary selling-point quality signal, resolving the transmission of the "Other reason" free text from the interface, updating the field's description to encourage feedback on the generated selling point, and defining a monitoring cadence shorter than annual.
  - Define a threshold for selling-point feedback quality, for example a subject matter expert periodically reading and classifying the collected free-text feedback and comparing the volume of adverse selling-point feedback to the number of leads generated over the monitoring period.
  - Rebuild the baselines from valid production data.
  - Resolve the internal threshold inconsistency.
  - Implement the sensitivity testing the plan describes, or revise the plan to describe the sensitivity analysis that will actually be performed.

  Because the streamlined testing scope relies on ongoing monitoring as a backstop for reduced independent testing, an adequate quality signal, defined thresholds, and valid baselines are necessary before the first monitoring cycle. See Section 12 of this validation report.
- Root Cause Selection: Technical Concern - The noted deficiency does not result from a control environment design deficiency or control breach and does not have a clear root cause.
- Justification for Classification: Per MRM Issue & Finding Management Guidelines, the classification is driven by: The streamlined testing scope relies on ongoing monitoring as the primary backstop for reduced independent testing, and the plan as drafted relies on a limited automated quality signal and does not define a threshold for selling-point feedback. A High Priority Finding is not warranted because the served content was independently reviewed by Validation and bankers review each output before use, which constrains near-term risk; a Low Priority Finding is not warranted because the monitoring backstop is central to the streamlined validation approach. Therefore, a Moderate Priority Finding is justified.

**Finding Table 4**
- Finding Count: 4
- Finding Name: Model 7468 Initial Validation Jul 2026 - Performance of Estimation Method
- Finding Priority: High
- MRM Category: Performance of Estimation Method
- Finding Description: The performance evidence provided for the model did not withstand review, and the serving pathway lacks a review gate:
  - The published aggregated retrieval results include values outside the feasible range of the stated metrics and could not be reconciled to the underlying row-level output; the model development team stated during the validation that the published production results were erroneous and that the row-level retrieval evaluation should be disregarded in its entirety. No retrieval performance evidence exists for the production environment, and the development-environment results cannot be reproduced because the underlying data is no longer available.
  - The effectiveness score attached to each selling point provides no demonstrated signal. The score is a self-assessment: it is requested from the same large language model call that generates the selling point, so no evaluation independent of the generation underlies it. In the production output, 169 of the 172 generated selling points (98.3 percent) carry a score of exactly 0.92 and the remaining three (1.7 percent) carry 0.95, and the code and prompt artifacts provided to Validation cannot be reconciled with these values; the generation code provided (rag_feature_generator.py) takes the score from the model response with a default of 0.0 when the model omits it, and the generation prompt requests a value between 0 and 1 without a reference value. The model documentation does not define the metric.
  - The llm_critique score attached to each selling point, the only other automated quality measure recorded, does not support a performance conclusion. Accuracy, the only criterion bearing on factual grounding, carries the lowest weight in the implemented rubric (15 percent), so the composite primarily reflects marketing quality, and an output scoring zero on factual grounding can exceed both acceptance thresholds stated in the monitoring plan. The recorded critique text is materially identical across the recorded score bands and identifies no factual-grounding or compliance concern, so the numeric differences between bands carry no discernible risk meaning, and the recorded composites cannot be decomposed because the sub-scores are not retained.
  - The subject matter expert review relied upon as the primary performance evidence under the streamlined scope is not evidenced: the results file provided records pass outcomes added by the model owner after the review rather than the reviewer's own entries, contains no reviewer rationale and none of the segment information the documentation states is reviewed with each output, and displayed the system's automated scores alongside each row, which the model owner acknowledged as a process gap. A pass is recorded for every row at every automated score value, including the two rows the system scored 0.00, below the monitoring plan's breach threshold. The review also lacks a documented standard for what constitutes a pass, including gradations, reviewer edits or enhancements, and an assessment of answer completeness against the available source content.
  - The review has no mechanism to modify content or withhold it from serving: selling points are generated by the model within each environment, including production, at startup and on regeneration events, and no technical control prevents unreviewed content from being served; the production cache was fully regenerated when the source documents were rebranded and was served before any review took place and without notification to Model Risk Management.
  - Validation performed an independent faithfulness review of all 172 cached selling points as substitute evidence (Section 8.1 of this validation report), which identified three selling points with unqualified cost phrasing traced to the recommender input data; the business line acknowledged that limitation and the correction is tracked to closure under this Finding.

  As a result, Validation requests the model owner and model development team to:
  - Provide the subject matter expert's original review record or a written attestation of the reviewer, dates, and method for the current cache.
  - Implement a documented row-level review for all future or regenerated content, under a documented review standard covering the pass criteria, completeness against the available source content, and reviewer edits or enhancements, with the reviewer, date, and rationale recorded and notification to Model Risk Management before production content is regenerated.
  - Correct the recommender input data underlying the flagged cost phrasing and the affected selling points under that documented review.
  - Re-establish a valid evaluation methodology against the current corpus, including a corrected Terminal ground-truth mapping, before any future regeneration.
  - Define the effectiveness score and its intended use in the model documentation and demonstrate with positive and negative cases that the score discriminates between effective and ineffective selling points, including the reasoning behind the assigned values, or remove the score from the model output and from any monitoring reliance.
  - If the large language model as-a-judge evaluation is retained for performance evidence or monitoring, report all sub-scores with each recorded composite so the composite can be decomposed, and revise the evaluation dimensions to measure factual grounding directly, for example faithfulness, context relevance, and answer relevance, consistent with standard retrieval-augmented generation evaluation practice and with the evaluation the model documentation describes.
  - Retain generation-time artifacts (inputs, retrieved content, outputs, and configuration) for each production generation event, and identify and record the deployed code version for each generation event, so that future verification is possible.
  - Ensure all future performance evidence states its environment and run date and is reproducible from retained artifacts.

  See Sections 4, 7.3, 8.1, 11, and 12 of this validation report.
- Root Cause Selection: Technical Concern - The noted deficiency does not result from a control environment design deficiency or control breach and does not have a clear root cause.
- Justification for Classification: Per MRM Issue & Finding Management Guidelines, the classification is driven by: The testing evidence provided is insufficient to support the model's performance, and process verification of the reported results could not be completed: the underlying data is no longer available, the results were withdrawn by the model development team during the validation, and the review control has no mechanism to gate what is served. A Moderate Priority Finding is not warranted because no reliable performance evidence produced by the model owner exists for the production environment; the near-term risk in use is contained by Validation's independent review of all served content and banker review before use, which is reflected in the restriction rather than the rating. Therefore, a High Priority Finding is justified.

