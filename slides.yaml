## 7.3 Model Construction and Selection

Validation reviewed the construction details. Documents are chunked using a two-tier approach, page-level segmentation followed by recursive character splitting, at 4,000 characters with 200-character overlap, and chunks are canonicalized to normalize brand and product terminology, which includes a search-and-replace that rebrands the generic Talech source content to Elavon. The retrieval query is assembled by a fixed template from the customer profile attributes and general product information; the recommended plan and feature details are excluded from this initial query and enter at re-ranking, where chunks mentioning the selected product features or plan names receive a relevance boost. Retrieval is hybrid: a primary dense vector search with L2 (Euclidean) distance over an Inverted File with Flat compression (IVFFlat) index of 100 partitions, returning the top 20 chunks, supplemented by a secondary entity-link retrieval based on document entity relationships, followed by a multi-factor relevance score with documented boosts (curated selling-point documents, product-type match, business-size match, content-category match, and recency), penalties (product-type mismatch and near-duplicate content), a minimum relevance threshold of 0.2, and per-document and total chunk limits for diversity. The production code path is rag_feature_generator.py; the rag_plus_generator.py path is legacy and not in production, and Validation's assessment addresses the production path. GPT-4o is used at a low-creativity setting for metadata extraction (temperature 0.1) and at a low temperature for generation (temperature 0.2 in the documented configuration), with a structured JSON response format and a custom, dynamically assembled prompt that places retrieved chunks behind a clear boundary to limit prompt injection and includes explicit negative constraints, for example not fabricating features and avoiding specific revenue figures. The generation prompt also includes the product name and description from the product database, in addition to the retrieved chunks; the product-attribute language in the outputs traces to these injected descriptions. This grounding pathway is not described in the documentation and is included in the Documentation Transparency and Robustness Finding (Section 5.4 of this validation report). Validation has no concerns with the construction approach itself.

The input and output guardrails are constructed around the gateway through which GPT-4o is accessed. The gateway applies authentication and authorization, comprehensive logging of interactions, Personally Identifiable Information (PII) detection and filtering, and content filtering, and contractual and technical controls provide that U.S. Bank data is not used by the provider to train its foundation models. The model also applies its own input handling, including PII handling, and output post-processing. Validation has no concerns with the construction of these controls as documented; the content and PII filtering are detailed and assessed as guardrails in Section 8.1.

Validation noted that the configuration block in the documentation shows a development environment setting (ENV_CAT=dev) and a default temperature of 0.2, while the narrative refers to a low temperature for consistency. The configuration values that apply in production, including the temperature, the token limits noted in Section 7.2, and the environment, should be confirmed against the production deployment; this confirmation is part of the Part 2 implementation verification (Section 11.3), which is deferred and out of scope for this validation. The absence of documented production configuration values is included in the Documentation Transparency and Robustness Finding (Section 5.4).

Validation reviewed the retrieval index construction. The retrieval index is an Inverted File with Flat compression (IVFFlat) approximate nearest neighbor index configured with 100 partitions over the 32-chunk corpus, which the documentation states was chosen as a pragmatic balance between speed and recall for the dataset size. Validation noted that at this corpus size partitioning provides little benefit and an approximate index can reduce recall relative to an exact search. Two considerations contain this observation. The product-document mapping supplements the dense embedding search so that relevant chunks are not missed, with the generation model making the final chunk selection, so the hybrid retrieval does not depend on the dense index alone. In addition, every output produced through this retrieval was independently reviewed by Validation, and production serving is cache-only with no retrieval at serve time (Sections 8.1 and 11), so any retrieval effect is contained within the reviewed outputs. Validation has no concerns with the retrieval construction for the current use. The re-ranking also applies a business-size match boost that depends on a company_size value and an annual_revenue field that the documentation states are extracted from the documents by GPT-4o. In practice this chunk metadata is not populated with usable values, so the business-size boost does not influence ranking, and the documented product-type boost is a placeholder that cannot operate because the product data model lacks the attribute it keys on; the documentation overstates this processing, which is captured in the Documentation Transparency and Robustness Finding (Section 5.4); the inactive code paths themselves are noted for awareness in Section 5.5.

## 7.4 Development Adjustments

Validation reviewed the adjustments applied to the model during development, before final performance evaluation. The development-time adjustments are the retrieval re-ranking tunings, the minimum relevance threshold, and the per-document and total chunk caps described in Section 7.3; their final configured values are disclosed. Consistent with the streamlined scope, the final configurations are disclosed even though a full tuning-justification record is not required at low risk. No score calibrations, overlays, or overrides are applied to the generated output during development. Validation has no concerns with this position. Adjustments applied after development, during or prior to use, are addressed in Section 8.5.

## 7.5 Assumptions and Limitations

Validation reviewed the assumptions and limitations identified by the developer and assessed their treatment. The developer identifies dependence on knowledge base quality (high materiality, mitigated by subject matter expert validation and version-controlled updates), generative output variability (medium, mitigated by low temperature and caching), limited domain coverage (low, mitigated by retrieval filtering and fallback responses), and token or context limits (low, mitigated by prompt standardization and grounding). Validation has no concerns with the developer's characterization for the documented products.

Validation additionally noted three limitations not fully developed in the documentation. Provenance is not exposed in the user interface and is available only in backend logs, which constrains a banker's ability to verify the source of a claim at the point of use. The captured feedback signal tracks the product recommendation rather than the quality of the generated selling point, which limits the ability to monitor generation quality after deployment. The LLM-as-a-judge evaluation was found to provide limited discriminating signal and is not relied upon by Validation. These are developed in Sections 8.4, 12.1, and 8.1 respectively.

