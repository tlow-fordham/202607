# Lumenova Guardrail Tier Configurations: Comparison and MDD Insert Pack

Internal working document. Prepared to support the MRM and AI Enablement guardrail documentation streamlining effort with Jim Howard. Source artifacts are the three Lumenova guardrail exports (version 1.1, exported 07/15/2026) provided by Jim Howard:

- [Tier 1 - High Risk](20260715_Lumenova_Guardrail_Tier_1_High_Risk.json) (slug `tier-1-high-risk-9f36df`)
- [Tier 2 - Moderate Risk](20260715_Lumenova_Guardrail_Tier_2_Moderate_Risk.json) (slug `tier-2-moderate-risk-f1fe3b`)
- [Tier 3 - Minimal Risk](20260715_Lumenova_Guardrail_Tier_3_Minimal_Risk.json) (slug `tier-3-minimal-risk-1de9cd`)

Each configuration is described by Lumenova as the minimum guardrail policy set to be used when onboarding a use case of that risk tier. Sections 3 through 5 below are written so a model developer can paste them into the Model Development Document (MDD), specifically the GenAI and Agentic AI Model Development Template Section 6 (Model Design and Construction, Instruction 8: describe constructions of the guardrails). Section 6 below is a paste-ready skeleton for MDD Section 7.2 (Guardrail Testing) with placeholders for the testing evidence Validation requires.

---

## 1. Configuration Common to All Three Tiers

All three tiers enable the same six policy components; the tiers differ in thresholds, actions, and topic lists, not in which components are present.

| Component | Setting (all tiers) |
|---|---|
| Blocked-content message | "I'm sorry but I can't help you with that." |
| Early return | Disabled |
| Input sanitization (pre-processing) | Enabled; same 20 entity types in all tiers: CREDIT_CARD, CRYPTO, DATE_TIME, DEVICE_ID, EMAIL_ADDRESS, IBAN_CODE, IP_ADDRESS, NRP, LOCATION, PASSWORD, PERSON, PHONE_NUMBER, MEDICAL_LICENSE, URL, US_BANK_NUMBER, US_DRIVER_LICENSE, US_ITIN, US_PASSPORT, US_SSN, VEHICLE_ID |
| Prompt injection detection (pre-processing) | Enabled in all tiers (threshold differs, see Section 2) |
| Language detection (pre-processing) | Not configured (null) in all tiers |
| Sensitive information filter (PII) | Enabled; same 20 entity types as input sanitization; no custom regex filters (actions differ in Tier 2, see Section 2) |
| Content filter (harmful categories) | Enabled; same 15 categories in all tiers: VIOLENT_CRIMES, NON_VIOLENT_CRIMES, SEX_CRIMES, CHILD_EXPLOITATION, DEFAMATION, SPECIALIZED_ADVICE, PRIVACY, INTELLECTUAL_PROPERTY, INDISCRIMINATE_WEAPONS, HATE, SELF_HARM, SEXUAL_CONTENT, ELECTIONS, CODE_INTERPRETER_ABUSE, OPEN_AI_CONTENT_FILTER |
| Word filter | Enabled; managed profanity filter on; no custom words |
| Trust score and coherence score | Enabled in all tiers (action and threshold differ, see Section 2) |
| Coherence score metrics | Same three metrics in all tiers: CONTEXT_RELEVANCE, RESPONSE_PERTINENCE, RESPONSE_GROUNDEDNESS (weights differ, see Section 2) |
| Restricted topics | Enabled in all tiers (mode, threshold, and topic list differ, see Section 2) |
| Evaluation policies | Not configured (null) in all tiers |

