Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part I.

# 5 Validation Summary

## 5.1 Prior Validation Outcomes

This is the initial validation of a new model; there are no prior full-validation outcomes. The model has operated in a limited pilot under a Provisional Approval, granted an Approved with Restriction outcome on 12/11/2025 for pilot use from 12/15/2025 through 04/15/2026, and a subsequent Special Purpose Validation that extended the pilot to 08/14/2026 (approved 04/09/2026). Both were time-bound provisional outcomes restricting the pilot to a subset of Small Business Specialist bankers and to three products, and neither raised any actionable or non-actionable observations or Findings. This Initial Validation is the full validation following the pilot period.

## 5.2 Summary of Recent Changes to Model

Measured against the last validation activity, the Provisional Approval and its Special Purpose Validation extension, three changes are relevant. First, the serving design changed during the pilot from generation at request time to pre-generated cached content, a change the model owner attributes to performance considerations; the cached design is the framework assessed throughout this report, and the change process is addressed in the Moderate Priority Finding on Compliance and Policy Adherence (Section 5.4 of this validation report). Second, the product branding changed from Talech to Elavon, implemented as a code-level search-and-replace during document processing, with the source documents unchanged and the production cache regenerated against the Elavon-branded content; this is assessed in Sections 7.1 and 8.1. Third, the banker feedback committed at the Provisional Approval, a 1-to-5 selling-point rating with free text, was not implemented: the 1-to-5 rating is not collected, addressed under the Moderate Priority Finding on Documentation Transparency and Robustness, and the committed free-text feedback was not enabled in production, addressed under the Moderate Priority Finding on Coding and Calculation Errors; the model owner states the collection has since been enabled, which Validation has not verified; the structured feedback currently collected is oriented to the product recommendation (thumbs up or down, with preset reject reasons), while the free-text feedback field can address either the recommendation or the generated selling point but is sparse in practice (Sections 10.1, 12, and 5.4). The model framework is otherwise unchanged from the provisionally approved version.

## 5.3 Current Validation Conclusions

Validation completed the Initial Validation of Model-7468 GenAI Selling Points, covering the model's generation of selling points for the three Elavon products within the scope defined in Section 2 of this validation report. The assessment drew on the Model Development Document, the production code and configuration, the reported subject matter expert review results, sample outputs, Validation's independent faithfulness review of the full cached population, and discussions with the model owner and model development team.

The outcome is Approved with Restrictions. Validation performed an independent faithfulness review of all 172 cached selling points against the source documents, the curated selling-points source, and the product database descriptions used in generation. The review identified three selling points, all for Elavon Terminal, with unqualified cost phrasing traced to the recommender input data; the business line acknowledged the limitation and the correction is tracked to closure under the High Priority Finding on Performance of Estimation Method. Bankers review each selling point before use and cannot alter it, and the model is internally facing, does not interact with customers, and does not decide without manual intervention. The recommendation step is deterministic and the risk rating recorded in the inventory is Low.

The evidence and control gaps identified during the validation are recorded in six Findings, detailed in Section 5.4 of this validation report. The published automated performance results could not be replicated from the underlying output and were withdrawn by the model development team during the validation; the effectiveness score attached to each output provides no demonstrated signal and its production values cannot be reconciled to the code and prompt artifacts provided; the subject matter expert review relied upon as the primary performance evidence is not evidenced by a reviewer-created record and has no mechanism to alter or withhold content from serving; content is regenerated by the model within each environment without a review gate before serving; coding errors disable a committed feedback control and introduce evaluation-code defects; the ongoing monitoring plan does not yet establish a reliable quality signal or valid baselines; the documentation does not fully reflect the model as built; the implementation document does not fully describe the implementation framework and controls; and changes were made to the model and its production content during the pilot without the prior review required by the documentation's own change-management definitions and without notification to Model Risk Management. Validation's independent review substitutes as the performance evidence for this validation, and the restriction contains the regeneration and review-control risk while the Findings are remediated.

On this basis the outcome is Approved with Restrictions: production use of the current cached selling points for the three Elavon products is approved for six months from the sign-off date ([TBD - sign-off date] through [TBD - sign-off date plus six months]). During the restriction period, no cached selling point may be regenerated and no new selling point may be added to production without documented subject matter expert review before serving and prior notification to Model Risk Management. Lifting the restriction requires closure of the Findings, in particular the High Priority Finding on Performance of Estimation Method; absent closure within the restriction period, production use is to cease pending remediation. The next validation activities are stated in Section 3 of this validation report.

