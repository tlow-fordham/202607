The model uses two externally developed foundation models from the same provider, accessed through Azure OpenAI by way of the enterprise generative AI gateway, with no fine-tuning. GPT-4o is the large language model (LLM) used for both document metadata extraction during pre-processing and selling-point generation. The text-embedding-ada-002 model is the embedding model used to represent both the product-document chunks and the query for retrieval, producing 1,536-dimension vectors. The same two models therefore serve multiple steps of the pipeline shown in Figure 4.1. Because both models come from a single external provider and serve more than one stage, a change to either model would affect multiple pipeline stages; the change-management treatment of such a change is addressed in Section 10.1.

GPT-4o is a proprietary, closed-source foundation model developed by OpenAI. It is a transformer-based, general-purpose, instruction-following generative model trained on a large and diverse corpus of publicly available and licensed text, with additional multimodal training; OpenAI does not publicly disclose the composition or size of the training corpus, the parameter count, or the training methodology. Because the model is closed-source and externally hosted, Validation assesses it as a vendor foundation model, relying on the provider's published documentation and on U.S. Bank's contractual and gateway controls rather than on direct inspection of the model internals. This is acceptable for a low risk, internal-facing application whose outputs are grounded in a controlled knowledge base and reviewed by a banker before use.

On capabilities and context limits, GPT-4o supports structured output (the application is configured to return JavaScript Object Notation, or JSON), multilingual text, and summarization and synthesis, which align with the requirement to generate concise, grounded selling points. GPT-4o's published specifications are an input context window of 128,000 tokens, a maximum output of 4,096 tokens for the base model and up to 16,384 tokens for later snapshots, and a training knowledge cutoff of October 2023; OpenAI does not publicly disclose the parameter count. The input context window is well above the token requirements of this application's knowledge base and prompts, and reliance on retrieval grounding mitigates the knowledge-cutoff limitation for product-specific content. The documentation is inconsistent on the maximum output tokens, showing 25,000 in the narrative and 2,000 in a configuration screenshot; neither aligns with the published maximum, so a 25,000-token output is not achievable. The exact GPT-4o snapshot and the production output-token value are confirmed as part of the Part 2 implementation verification (Section 11.3 of this validation report); the documentation inconsistency is captured in the Documentation Transparency and Robustness Finding (Section 5.4).

On published performance, GPT-4o is a widely adopted, industry-standard model that performs competitively on public benchmarks for general knowledge, reasoning, instruction-following, and text generation. Table 7.2 presents the Massive Multitask Language Understanding (MMLU) benchmark, a context-based multiple-choice evaluation covering 57 academic and professional subjects, assembled by Validation from publicly available sources to give context on the model's standing relative to comparators; it characterizes general capability and does not substitute for the use-case-specific outcome evaluation in Section 8. Benchmarking scope is limited to MMLU, which is sufficient to establish general capability for a low risk, internal-facing application; additional benchmarks such as IFEval (instruction-following) and MT-Bench (open-ended generation) are not assessed.

**Table 7.2 - Published benchmark standing of GPT-4o (assembled by Validation from public sources).**

| Benchmark | Capability measured | GPT-4o | Comparator(s) |
|---|---|---|---|
| MMLU | General knowledge and reasoning | 88.7% | Mixtral 71.7%; Llama 2 69.5% |

This published standing, together with the use-case fit described above, supports the appropriateness of the selection for a low risk, internal-facing application. It is distinct from the outcome benchmarking addressed in Section 8.2, which is not applicable for this model.

The text-embedding-ada-002 model is a general-purpose retrieval embedding model, also developed by OpenAI and accessed through the same gateway, that maps text to 1,536-dimension vectors with a published maximum input of approximately 8,191 tokens, well above the configured 4,000-character chunk size. It embeds both the product-document chunks at ingestion and the assembled query at retrieval time, so that similarity is computed in a single shared vector space. Validation noted that text-embedding-ada-002 is a prior-generation embedding model and that newer embedding models are available; whether to adopt a newer model is a matter for the model owner to consider and does not raise a concern for the current use.

Both models are reached only through U.S. Bank's enterprise generative AI gateway, the Azure OpenAI gateway, which is maintained by Information Systems Security and is the bank's sanctioned path for foundation-model access. The application authenticates to the gateway using an OAuth2 client-credentials flow and reaches it through the enterprise proxy. The gateway applies platform-level controls to all traffic: Personally Identifiable Information (PII) filtering on both inputs and outputs, content filtering using neural multi-class classification that screens harmful content across four categories (hate, sexual, violence, and self-harm) at four severity levels with content at medium or high severity filtered by default, and comprehensive logging of all interactions that provides an audit trail. Contractual and technical controls provide that U.S. Bank data sent through the gateway is not used by the provider to train its foundation models. These controls are enterprise-standard and apply to all gateway traffic rather than being tuned to this model; their construction is described in Section 7.3 and their adequacy as a guardrail is assessed in Section 8.1.

