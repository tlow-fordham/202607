# 10 Model Governance

## 10.1 Development Document Review and Model Change Management

The model documentation describes the model's architecture, data, construction, and guardrails, and defines the material-versus-minor model change categories. Under those definitions, a change in the foundation model, significant prompt or constraint changes, changes to retrieval methodology, changes to guardrails, and the addition of new product domains are material and require prior Model Risk Governance (MRG) review.

**Validation Comments:**

The documentation is adequate to support the review, but does not fully reflect the deployed system. The gaps span:
- The data counts and configuration values (the knowledge base chunk count, the maximum output-token value, and the production configuration).
- The architecture diagram's omission of the production cache.
- The chunk-metadata, entity-link, and retrieval-boost descriptions and the data inventory's curated mapping dataset description.
- The injected product-description pathway and the recommender mapping data.
- The feedback streams collected and the per-environment generation and cache-change governance.
- The effectiveness score and the evaluation descriptions, the Estimation Method Assessment identifier, and residual drafting artifacts.

These are enumerated with the corresponding corrections in the Moderate Priority Finding on Documentation Transparency and Robustness (Section 5.4 of this validation report). Individually correctable, collectively they indicate that the documentation does not fully reflect the model as built.

Validation considers the material-change definitions appropriate. Because the model's outputs are grounded in the knowledge base and the curated elavonSellingPoints.xlsx source carries the largest retrieval boost, an update to that source or to the knowledge base can directly change outputs; Validation's position is that such updates should be treated as material. The gap in the change-management definitions is raised in the Documentation Transparency and Robustness Finding, and the changes made to production content during the pilot without a new submission to Model Risk Management are addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4).

## 10.2 Model Change Review

As an initial validation of a new model, a post-production model change review is not applicable, as there is no prior validation against which to assess changes. Changes made during development and the pilot, including the serving-design change to pre-generated cached content, the Talech-to-Elavon rebranding, and the cache regeneration, are assessed within this validation; the changes made to production content during the pilot without a new submission to Model Risk Management are addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4).

**Validation Comments:**

Validation noted several changes the Model Owner (MO) should expect to manage under the change-management process going forward. The production deployment uses a preview version of the provider's interface (Azure OpenAI API version 2025-04-01-preview); preview versions can change in behavior or be deprecated, so the management of the interface version should be addressed. A change of the foundation model serving any of the model's functions, whether generation, product-to-chunk link extraction, or the automated evaluation, is a material change under the document's own definitions and requires a separate validation activity before changed content is served; a notification and validation path for such a change should be documented. Validation's position is that a change of the embedding model warrants the same treatment, because it changes every stored document vector and the retrieval behavior. The MO should confirm whether any changes are expected before the next validation activity.

