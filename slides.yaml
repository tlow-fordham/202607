## 2. All Differences Between Tiers

### 2.1 Threshold, action, and mode differences

| Parameter | Tier 1 - High Risk | Tier 2 - Moderate Risk | Tier 3 - Minimal Risk |
|---|---|---|---|
| Prompt injection detection threshold (pre-processing) | 0.25 | 0.50 | 0.75 |
| Content filter: LLM-based prompt injection attacks filter | Enabled, filter strength 0.25 | Not configured (null) | Not configured (null) |
| Content filter: dedicated LLM config | `llm_config_id` c74d2354-559d-4f13-9945-13c90aa3c0a2 | None (null) | None (null) |
| Trust score action / threshold | BLOCK / 0.75 | INFORM / 0.50 | INFORM / 0.50 |
| Coherence score action / threshold | BLOCK / 0.75 | INFORM / 0.50 | INFORM / 0.50 |
| Coherence metric weights (relevance / pertinence / groundedness) | 0.25 / 0.25 / 0.50 | 0.3333 / 0.3333 / 0.3334 | 0.3333 / 0.3333 / 0.3334 |
| Restricted topics mode | RESTRICT (blocklist) | ALLOW (allowlist) | ALLOW (allowlist) |
| Restricted topics threshold | 0.25 | 0.50 | 0.75 |

Threshold semantics should be confirmed against Lumenova documentation before these values are characterized in the MDD: for the detection-style policies (prompt injection, restricted topics) a lower threshold appears to mean more sensitive flagging, while for the trust and coherence scores a higher threshold combined with a BLOCK action means responses must clear a higher quality bar to be released. [TBD: confirm threshold direction/semantics with Lumenova documentation or Jim Howard before finalizing MDD language.]

### 2.2 PII filter action differences (sensitive information filter)

Tier 1 and Tier 3 apply BLOCK with TAG masking mode to all 20 entity types. Tier 2 relaxes 10 of the 20 entity types from BLOCK to MASK with REDACT masking mode:

| Entity type | Tier 1 | Tier 2 | Tier 3 |
|---|---|---|---|
| CREDIT_CARD | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| CRYPTO | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| DATE_TIME | BLOCK / TAG | MASK / REDACT | BLOCK / TAG |
| DEVICE_ID | BLOCK / TAG | MASK / REDACT | BLOCK / TAG |
| EMAIL_ADDRESS | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| IBAN_CODE | BLOCK / TAG | MASK / REDACT | BLOCK / TAG |
| IP_ADDRESS | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| NRP | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| LOCATION | BLOCK / TAG | MASK / REDACT | BLOCK / TAG |
| PASSWORD | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| PERSON | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| PHONE_NUMBER | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| MEDICAL_LICENSE | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
| URL | BLOCK / TAG | MASK / REDACT | BLOCK / TAG |
| US_BANK_NUMBER | BLOCK / TAG | BLOCK / TAG | BLOCK / TAG |
