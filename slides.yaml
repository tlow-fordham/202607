Internal working draft. Component of the Model-7468 GenAI Selling Points Initial Validation report. Part I.

# 5 Validation Summary

## 5.1 Prior Validation Outcomes

This is the initial validation of a new model; there are no prior full-validation outcomes. The model has operated in a limited pilot under a Provisional Approval, granted an Approved with Restriction outcome on 12/11/2025 for pilot use from 12/15/2025 through 04/15/2026, and a subsequent Special Purpose Validation that extended the pilot to 08/14/2026 (signed off 04/13/2026). Both were time-bound provisional outcomes restricting the pilot to a subset of Small Business Specialist bankers: the Provisional Approval covered the three Talech (now Elavon) products, and the Special Purpose Validation extension additionally covered the money-movement products served as static entries. Neither raised any actionable or non-actionable observations or Findings. This Initial Validation is the full validation following the pilot period.

## 5.2 Summary of Recent Changes to Model

Measured against the last validation activity, the Provisional Approval and its Special Purpose Validation extension, three changes are relevant:
1. The serving design changed during the pilot from generation at request time to pre-generated cached content, a change the Model Owner (MO) attributes to performance considerations. The cached design is the framework assessed throughout this report. The change was made without a new submission to Model Risk Management and is addressed in the High Priority Finding on Performance of Estimation Method (Section 5.4 of this validation report).
2. The product branding changed from Talech to Elavon, implemented as a code-level search-and-replace during document processing, with the source documents unchanged and the production cache regenerated against the Elavon-branded content. This is assessed in Sections 7.1 and 8.1.
3. The banker feedback committed at the Provisional Approval, a 1-to-5 selling-point rating with free text, was not implemented. The 1-to-5 rating is not collected, addressed under the Moderate Priority Finding on Documentation Transparency and Robustness. The committed free-text feedback was not enabled in production, addressed under the Moderate Priority Finding on Coding and Calculation Errors; the MO states the collection has since been enabled, which Validation has not verified.

The structured feedback currently collected is oriented to the product recommendation (thumbs up or down, with preset reject reasons), while the free-text feedback field can address either the recommendation or the generated selling point but is sparse in practice (Sections 5.4, 10.1, and 12). The model framework is otherwise unchanged from the provisionally approved version.

## 5.3 Current Validation Conclusions

Validation completed the Initial Validation of Model-7468 GenAI Selling Points, covering the model's generation of selling points for the three Elavon products within the scope defined in Section 2 of this validation report. The assessment drew on the Model Development Document, the production code and configuration, the reported subject matter expert review results, sample outputs, Validation's independent faithfulness review of the full cached population, and discussions with the MO and Model Developer (MD).

The outcome is Approved with Restrictions. Validation performed an independent faithfulness review of all 172 cached selling points against the source documents, the curated selling-points source, and the product database descriptions used in generation. The review identified three selling points, all for Elavon Terminal, with unqualified cost phrasing traced to the recommender input data; the business line acknowledged the limitation and the correction is tracked to closure under the High Priority Finding on Performance of Estimation Method. Bankers review each selling point before use and cannot alter it, and the model is internally facing, does not interact with customers, and does not make decisions without manual intervention. The recommendation step is deterministic and the risk rating recorded in the inventory is Low.

The evidence and control gaps identified during the validation are recorded in five Findings, detailed in Section 5.4 of this validation report: the High Priority Finding on Performance of Estimation Method, and the Moderate Priority Findings on Coding and Calculation Errors, Documentation Transparency and Robustness, Monitoring, and Implementation Process. The principal gaps are:
- The published automated performance results could not be replicated from the underlying output and were withdrawn by the MD after Validation challenged the reported values.
- The effectiveness score attached to each output provides no demonstrated signal, and its production values cannot be reconciled to the code and prompt artifacts provided.
- The subject matter expert review presented as the primary performance evidence is a single blanket attestation with no reviewer-created row-level record, and has no mechanism to alter, curate, or withhold content from serving.
- Content is regenerated by the model within each environment without a review gate before serving.
- Coding errors disable a committed feedback control and introduce evaluation-code defects.
- The ongoing monitoring plan does not yet establish a reliable quality signal or valid baselines.
- The documentation does not fully reflect the model as built, and the implementation document does not fully describe the implementation framework and controls.
- Changes were made to the model and its production content during the pilot, including the serving-design change and the rebrand cache regeneration, which were served without review and without notification to Model Risk Management (raised within the High Priority Finding on Performance of Estimation Method).

Validation's independent review is the primary performance evidence for this validation, and the restriction contains the regeneration and review-control risk while the Findings are remediated.

On this basis the outcome is Approved with Restrictions: production use of the current cached selling points for the three Elavon products is approved for six months from the sign-off date ([TBD - sign-off date] through [TBD - sign-off date plus six months]). During the restriction period, no cached selling point may be regenerated and no new selling point may be added to production without documented subject matter expert review before serving and prior notification to Model Risk Management. Lifting the restriction requires closure of the High Priority Finding on Performance of Estimation Method; absent closure within the restriction period, production use is to cease pending remediation. The four Moderate Priority Findings are tracked to closure through the standard issue-management process. The next validation activities are stated in Section 3 of this validation report.

